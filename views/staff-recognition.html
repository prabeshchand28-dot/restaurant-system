<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#f97316"/><link rel="apple-touch-icon" href="/icons/icon-192.png"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Uena"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Staff Recognition Board</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--gold:#b7860a;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--gold);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.85;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1100px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .num{font-size:22px;font-weight:900}.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.grid{display:grid;grid-template-columns:320px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--gold);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
textarea{resize:vertical;min-height:60px}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--gold);color:#fff}
.btn-green{background:var(--green);color:#fff}.btn-red{background:var(--red);color:#fff}
.nom-card{border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;background:var(--white);transition:box-shadow .2s}
.nom-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.nom-card.AWARDED{border:2px solid var(--gold);background:linear-gradient(135deg,#fffde7,var(--white))}
.nom-card.APPROVED{border-left:4px solid var(--green)}
.nom-card.NOMINATED{border-left:4px solid var(--muted)}
.badge{display:inline-block;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:800}
.s-NOMINATED{background:#f0f0f0;color:var(--muted)}.s-APPROVED{background:#e7f5ed;color:var(--green)}.s-AWARDED{background:#fffde7;color:var(--gold)}
.trophy{font-size:48px;margin-bottom:6px;display:block;text-align:center}
.month-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.month-btn{padding:6px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:var(--white)}
.month-btn.active{background:var(--gold);color:#fff;border-color:var(--gold)}
.vote-num{font-size:28px;font-weight:900;color:var(--gold);min-width:50px;text-align:center}
.award-icons{EMPLOYEE_OF_MONTH:'🏆',BEST_SERVICE:'⭐',MOST_IMPROVED:'📈',PUNCTUALITY:'⏰',TEAM_PLAYER:'🤝'}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Staff Recognition Board</span></span>
  <div><a class="nav-btn" href="/staff">👤 Staff</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="stats">
    <div class="stat"><div class="num" id="s-total" style="color:var(--navy)">—</div><div class="lbl">Total Nominations</div></div>
    <div class="stat"><div class="num" id="s-month" style="color:var(--gold)">—</div><div class="lbl">This Month</div></div>
    <div class="stat"><div class="num" id="s-approved" style="color:var(--green)">—</div><div class="lbl">Approved</div></div>
    <div class="stat"><div class="num" id="s-awarded" style="color:var(--gold)">—</div><div class="lbl">🏆 Awarded</div></div>
  </div>

  <div class="grid">
    <div>
      <div class="card">
        <div class="card-header">🏆 Nominate Staff</div>
        <div class="card-body">
          <label>Staff Member</label>
          <select id="nStaff"><option value="">Select staff...</option></select>
          <label>Award Category</label>
          <select id="nAward">
            <option value="EMPLOYEE_OF_MONTH">🏆 Employee of the Month</option>
            <option value="BEST_SERVICE">⭐ Best Service</option>
            <option value="MOST_IMPROVED">📈 Most Improved</option>
            <option value="PUNCTUALITY">⏰ Best Punctuality</option>
            <option value="TEAM_PLAYER">🤝 Team Player</option>
          </select>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div><label>Month</label>
              <select id="nMonth">
                <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                <option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option>
                <option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option>
                <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
              </select>
            </div>
            <div><label>Year</label><input type="number" id="nYear" value="2026"/></div>
          </div>
          <label>Nominated By</label><input id="nBy" placeholder="Your name"/>
          <label>Reason</label><textarea id="nReason" placeholder="Why do they deserve this award?"></textarea>
          <button class="btn" style="width:100%;margin-top:14px" onclick="nominate()">🏅 Nominate</button>
        </div>
      </div>
    </div>
    <div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
        <select id="fMonth" onchange="loadNoms()" style="width:110px">
          <option value="">All Months</option>
          <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
          <option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option>
          <option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option>
          <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
        </select>
        <input type="number" id="fYear" value="2026" onchange="loadNoms()" style="width:80px"/>
        <select id="fStatus" onchange="loadNoms()" style="width:140px">
          <option value="">All Status</option>
          <option value="NOMINATED">Nominated</option>
          <option value="APPROVED">Approved</option>
          <option value="AWARDED">Awarded 🏆</option>
        </select>
      </div>
      <div id="nomList">Loading...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});
const AWARD_ICONS={EMPLOYEE_OF_MONTH:'🏆',BEST_SERVICE:'⭐',MOST_IMPROVED:'📈',PUNCTUALITY:'⏰',TEAM_PLAYER:'🤝'};
const MONTHS=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let staffList=[];
const now=new Date();
document.getElementById('nMonth').value=now.getMonth()+1;

async function init(){
  const r=await fetch('/api/staff',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  staffList=d.data||d;
  const sel=document.getElementById('nStaff');
  staffList.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.dataset.name=s.name;o.textContent=s.name;sel.appendChild(o);});
  loadStats();loadNoms();
}

async function loadStats(){
  const r=await fetch('/api/staff-recognitions/stats',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  document.getElementById('s-total').textContent=d.total;
  document.getElementById('s-month').textContent=d.thisMonth;
  document.getElementById('s-approved').textContent=d.awarded;
  document.getElementById('s-awarded').textContent=d.awarded;
}

async function loadNoms(){
  const month=document.getElementById('fMonth').value;
  const year=document.getElementById('fYear').value;
  const status=document.getElementById('fStatus').value;
  let url='/api/staff-recognitions?a=1';
  if(month)url+=`&month=${month}`;if(year)url+=`&year=${year}`;if(status)url+=`&status=${status}`;
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const noms=await r.json();
  if(!noms.length){document.getElementById('nomList').innerHTML='<div style="text-align:center;padding:60px;background:var(--white);border-radius:12px;color:var(--muted)">No nominations yet for this period</div>';return;}
  document.getElementById('nomList').innerHTML=noms.map(n=>`<div class="nom-card ${n.status}">
    <div style="display:flex;align-items:flex-start;gap:14px">
      <div style="font-size:42px;line-height:1">${AWARD_ICONS[n.award]||'🏅'}</div>
      <div style="flex:1">
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
          <span class="badge s-${n.status}">${n.status}</span>
          <span style="font-size:11px;color:var(--muted)">${MONTHS[n.month]} ${n.year}</span>
        </div>
        <div style="font-size:16px;font-weight:900">${n.staffName}</div>
        <div style="font-size:12px;color:var(--gold);font-weight:700;margin-top:2px">${n.award.replace(/_/g,' ')}</div>
        ${n.reason?`<div style="font-size:12px;color:#333;margin-top:6px;font-style:italic">"${n.reason}"</div>`:''}
        <div style="font-size:11px;color:var(--muted);margin-top:4px">Nominated by: ${n.nominatedBy||'—'}</div>
      </div>
      <div class="vote-num">${n.votes}<div style="font-size:10px;color:var(--muted);font-weight:600">votes</div></div>
    </div>
    <div style="margin-top:10px;display:flex;gap:6px">
      ${n.status==='NOMINATED'?`<button class="btn btn-green" style="font-size:11px;padding:5px 10px" onclick="approveNom(${n.id},'APPROVED')">✅ Approve</button>`:''}
      ${n.status==='APPROVED'?`<button class="btn" style="font-size:11px;padding:5px 10px" onclick="approveNom(${n.id},'AWARDED')">🏆 Award!</button>`:''}
      <button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="delNom(${n.id})">Del</button>
    </div>
  </div>`).join('');
}

async function nominate(){
  const staffSel=document.getElementById('nStaff');
  if(!staffSel.value){showToast('Select staff','error');return;}
  const body={staffId:staffSel.value,staffName:staffSel.options[staffSel.selectedIndex].dataset.name||'',month:document.getElementById('nMonth').value,year:document.getElementById('nYear').value,award:document.getElementById('nAward').value,nominatedBy:document.getElementById('nBy').value,reason:document.getElementById('nReason').value};
  const r=await fetch('/api/staff-recognitions',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Nominated! 🏅','success');document.getElementById('nReason').value='';document.getElementById('nBy').value='';loadStats();loadNoms();}
  else showToast(d.message||'Error','error');
}

async function approveNom(id,status){
  const approvedBy=prompt(`${status==='AWARDED'?'Awarded':'Approved'} by:`);
  if(approvedBy===null)return;
  await fetch(`/api/staff-recognitions/${id}/approve`,{method:'PATCH',headers:authH(),body:JSON.stringify({status,approvedBy})});
  showToast(status==='AWARDED'?'🏆 Award given!':'Approved!','success');loadNoms();loadStats();
}

async function delNom(id){
  if(!confirm('Delete nomination?'))return;
  await fetch(`/api/staff-recognitions/${id}`,{method:'DELETE',headers:authH()});
  loadStats();loadNoms();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}
init();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
