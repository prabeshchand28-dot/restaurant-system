<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tip Pool Distribution</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--gold:#b7860a;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1100px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .num{font-size:20px;font-weight:900}.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.grid{display:grid;grid-template-columns:340px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}.btn-gold{background:var(--gold)}
.pool-card{border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.pool-card.OPEN{border-left:4px solid var(--gold)}
.pool-card.DISTRIBUTED{border-left:4px solid var(--green);opacity:.8}
.entry-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.staff-entry{border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;margin-bottom:6px;background:#f8f9fc}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:800}
.s-OPEN{background:#fffde7;color:var(--gold)}.s-DISTRIBUTED{background:#e7f5ed;color:var(--green)}
.share-bar{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin-top:4px}
.share-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--orange))}
#staffRows{margin-top:12px}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Tip Pool Distribution</span></span>
  <div><a class="nav-btn" href="/tips">💰 Tips</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="stats">
    <div class="stat"><div class="num" id="s-open" style="color:var(--gold)">—</div><div class="lbl">Open Pools</div></div>
    <div class="stat"><div class="num" id="s-dist" style="color:var(--green)">—</div><div class="lbl">Distributed</div></div>
    <div class="stat"><div class="num" id="s-today" style="color:var(--gold)">—</div><div class="lbl">Tips Today (रू)</div></div>
    <div class="stat"><div class="num" id="s-month" style="color:var(--orange)">—</div><div class="lbl">Tips This Month (रू)</div></div>
  </div>
  <div class="grid">
    <div>
      <div class="card">
        <div class="card-header">💰 Create Tip Pool</div>
        <div class="card-body">
          <label>Date</label><input type="date" id="pDate"/>
          <label>Shift</label>
          <select id="pShift">
            <option value="ALL">All Day</option>
            <option value="MORNING">☀️ Morning</option>
            <option value="AFTERNOON">🌤️ Afternoon</option>
            <option value="EVENING">🌙 Evening</option>
          </select>
          <label>Total Tips Collected (रू)</label>
          <input type="number" id="pTotal" placeholder="e.g. 2500" min="0" oninput="recalcShares()"/>
          <label>Notes</label><input id="pNotes" placeholder="e.g. Busy Friday night..."/>
          <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:12px;font-weight:700;color:var(--navy)">Staff on Shift</span>
            <button class="btn" style="font-size:11px;padding:4px 10px" onclick="addStaffRow()">+ Add Staff</button>
          </div>
          <div id="staffRows"></div>
          <div id="sharePreview" style="margin-top:10px;background:#f8f9fc;border-radius:8px;padding:10px;display:none"></div>
          <button class="btn btn-gold" style="width:100%;margin-top:14px;background:var(--gold)" onclick="createPool()">💰 Create & Calculate</button>
        </div>
      </div>
    </div>
    <div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <select id="fStatus" onchange="loadPools()" style="width:150px">
          <option value="">All Pools</option>
          <option value="OPEN">Open</option>
          <option value="DISTRIBUTED">Distributed</option>
        </select>
      </div>
      <div id="poolList">Loading...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});
let staffList=[];
let rowCount=0;

document.getElementById('pDate').value=new Date().toISOString().slice(0,10);

async function init(){
  const r=await fetch('/api/staff',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  staffList=d.data||d;
  addStaffRow();addStaffRow(); // start with 2 rows
  loadStats();loadPools();
}

async function loadStats(){
  const r=await fetch('/api/tip-pool/stats',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  document.getElementById('s-open').textContent=d.open;
  document.getElementById('s-dist').textContent=d.distributed;
  document.getElementById('s-today').textContent='रू '+Math.round(d.todayTips).toLocaleString();
  document.getElementById('s-month').textContent='रू '+Math.round(d.monthTips).toLocaleString();
}

function addStaffRow(){
  rowCount++;
  const id=rowCount;
  const opts=staffList.map(s=>`<option value="${s.id}" data-name="${s.name}">${s.name}</option>`).join('');
  const div=document.createElement('div');
  div.className='staff-entry';
  div.id=`row-${id}`;
  div.innerHTML=`<select id="rs-${id}" style="flex:1;min-width:0">${opts}</select>
    <input type="number" id="rh-${id}" placeholder="hrs" style="width:60px" min="0" step="0.5" oninput="recalcShares()"/>
    <button onclick="removeRow(${id})" style="background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:0 4px">×</button>`;
  document.getElementById('staffRows').appendChild(div);
}

function removeRow(id){document.getElementById(`row-${id}`).remove();recalcShares();}

function getEntries(){
  const entries=[];
  document.querySelectorAll('[id^="row-"]').forEach(row=>{
    const id=row.id.split('-')[1];
    const sel=document.getElementById(`rs-${id}`);
    const hrs=parseFloat(document.getElementById(`rh-${id}`).value)||0;
    if(sel&&hrs>0){
      const opt=sel.options[sel.selectedIndex];
      entries.push({staffId:sel.value,staffName:opt.dataset.name||opt.text,hoursWorked:hrs});
    }
  });
  return entries;
}

function recalcShares(){
  const total=parseFloat(document.getElementById('pTotal').value)||0;
  const entries=getEntries();
  if(!total||!entries.length){document.getElementById('sharePreview').style.display='none';return;}
  const totalHrs=entries.reduce((s,e)=>s+e.hoursWorked,0);
  const rows=entries.map(e=>{const share=Math.round(total*e.hoursWorked/totalHrs*100)/100;return `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${e.staffName} (${e.hoursWorked}h)</span><strong>रू ${share.toLocaleString()}</strong></div>`;}).join('');
  document.getElementById('sharePreview').style.display='block';
  document.getElementById('sharePreview').innerHTML=`<div style="font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px">PREVIEW</div>${rows}`;
}

async function createPool(){
  const total=document.getElementById('pTotal').value;
  if(!total){showToast('Enter total tips','error');return;}
  const entries=getEntries();
  if(!entries.length){showToast('Add at least one staff member with hours','error');return;}
  const body={date:document.getElementById('pDate').value,shift:document.getElementById('pShift').value,totalTips:parseFloat(total),notes:document.getElementById('pNotes').value,entries};
  const r=await fetch('/api/tip-pool',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Tip pool created!','success');document.getElementById('pTotal').value='';document.getElementById('pNotes').value='';document.getElementById('sharePreview').style.display='none';loadStats();loadPools();}
  else showToast(d.message||'Error','error');
}

async function loadPools(){
  const status=document.getElementById('fStatus').value;
  let url='/api/tip-pool'+(status?`?status=${status}`:'');
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const pools=await r.json();
  if(!pools.length){document.getElementById('poolList').innerHTML='<div style="text-align:center;padding:60px;background:var(--white);border-radius:12px;color:var(--muted)">No tip pools found</div>';return;}
  document.getElementById('poolList').innerHTML=pools.map(p=>{
    const totalHrs=p.entries.reduce((s,e)=>s+e.hoursWorked,0);
    return `<div class="pool-card ${p.status}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="badge s-${p.status}">${p.status}</span>
            <span style="font-size:12px;color:var(--muted)">${p.shift} · ${new Date(p.date).toLocaleDateString()}</span>
          </div>
          <div style="font-size:22px;font-weight:900;color:var(--gold);margin-top:4px">रू ${p.totalTips.toLocaleString()}</div>
          <div style="font-size:12px;color:var(--muted)">${p.entries.length} staff · ${totalHrs} total hours</div>
          ${p.notes?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${p.notes}</div>`:''}
        </div>
        ${p.status==='DISTRIBUTED'?`<div style="font-size:11px;color:var(--green);text-align:right">✅ By: ${p.closedBy||'—'}</div>`:''}
      </div>
      <div style="margin-top:10px">
        ${p.entries.map(e=>{const pct=totalHrs>0?Math.round(e.hoursWorked/totalHrs*100):0;return `<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:700">${e.staffName} <span style="font-weight:400;color:var(--muted)">(${e.hoursWorked}h)</span></span><strong>रू ${e.tipShare.toLocaleString()} <span style="color:var(--muted);font-weight:400">(${pct}%)</span></strong></div>`;}).join('')}
      </div>
      <div style="margin-top:10px;display:flex;gap:6px">
        ${p.status==='OPEN'?`<button class="btn btn-green" style="font-size:11px;padding:5px 10px" onclick="distribute(${p.id})">✅ Mark Distributed</button>`:''}
        <button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="delPool(${p.id})">Del</button>
      </div>
    </div>`;
  }).join('');
}

async function distribute(id){
  const closedBy=prompt('Distributed by (manager name):');
  if(!closedBy)return;
  const r=await fetch(`/api/tip-pool/${id}/distribute`,{method:'PATCH',headers:authH(),body:JSON.stringify({closedBy})});
  if((await r.json()).id){showToast('Marked distributed!','success');loadStats();loadPools();}
}

async function delPool(id){
  if(!confirm('Delete?'))return;
  await fetch(`/api/tip-pool/${id}`,{method:'DELETE',headers:authH()});
  loadStats();loadPools();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

init();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
