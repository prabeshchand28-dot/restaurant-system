<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Table Hygiene Log</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1100px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .num{font-size:20px;font-weight:900}.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border)}
.tab{padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--muted)}
.tab.active{color:var(--navy);border-color:var(--navy)}
.panel{display:none}.panel.active{display:block}
.grid{display:grid;grid-template-columns:300px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}
.table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.table-tile{background:var(--white);border:2px solid var(--border);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .2s}
.table-tile:hover{border-color:var(--blue)}
.table-tile.clean{border-color:var(--green);background:#f0fdf4}
.table-tile.stale{border-color:var(--orange);background:#fffbf0}
.table-tile.overdue{border-color:var(--red);background:#fff5f5}
.table-num{font-size:22px;font-weight:900}
.table-time{font-size:11px;color:var(--muted);margin-top:4px}
.log-row{border-bottom:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;font-size:13px}
.log-row:last-child{border-bottom:none}
.type-chip{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.t-STANDARD{background:#e8efff;color:var(--blue)}.t-DEEP{background:#f3e5f5;color:#6c3483}.t-POST_EVENT{background:#fff3e0;color:var(--orange)}.t-SANITIZE{background:#e7f5ed;color:var(--green)}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Table Hygiene Log</span></span>
  <div><a class="nav-btn" href="/tables">🪑 Tables</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="stats">
    <div class="stat"><div class="num" id="s-today" style="color:var(--green)">—</div><div class="lbl">Cleans Today</div></div>
    <div class="stat"><div class="num" id="s-deep" style="color:var(--blue)">—</div><div class="lbl">🧹 Deep Cleans</div></div>
    <div class="stat"><div class="num" id="s-stale" style="color:var(--orange)">—</div><div class="lbl">⏰ Need Attention</div></div>
    <div class="stat"><div class="num" id="s-overdue" style="color:var(--red)">—</div><div class="lbl">🚨 Overdue</div></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('board')">🗺️ Status Board</div>
    <div class="tab" onclick="switchTab('log')">📋 Log Cleaning</div>
    <div class="tab" onclick="switchTab('history')">📜 History</div>
  </div>

  <!-- STATUS BOARD -->
  <div class="panel active" id="panel-board">
    <div id="boardGrid">Loading...</div>
    <div style="margin-top:12px;display:flex;gap:12px;font-size:12px">
      <span><span style="display:inline-block;width:12px;height:12px;background:var(--green);border-radius:3px;margin-right:4px;vertical-align:middle"></span>Clean (&lt;1h)</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:var(--orange);border-radius:3px;margin-right:4px;vertical-align:middle"></span>Attention (1-3h)</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:var(--red);border-radius:3px;margin-right:4px;vertical-align:middle"></span>Overdue (&gt;3h)</span>
      <span><span style="display:inline-block;width:12px;height:12px;background:#f0f0f0;border:1px solid #ccc;border-radius:3px;margin-right:4px;vertical-align:middle"></span>Never logged</span>
    </div>
  </div>

  <!-- LOG CLEANING -->
  <div class="panel" id="panel-log">
    <div style="max-width:500px">
      <div class="card">
        <div class="card-header">🧽 Log Table Cleaning</div>
        <div class="card-body">
          <label>Table Number</label>
          <select id="lTable"><option value="">Select table...</option></select>
          <label>Cleaned By</label><input id="lStaff" placeholder="Staff name"/>
          <label>Cleaning Type</label>
          <select id="lType">
            <option value="STANDARD">🧽 Standard (between covers)</option>
            <option value="DEEP">🧹 Deep clean (end of shift)</option>
            <option value="SANITIZE">🦠 Sanitize (post-illness)</option>
            <option value="POST_EVENT">🎉 Post-event clean</option>
          </select>
          <label>Duration (minutes)</label>
          <input type="number" id="lDuration" value="5" min="1" max="120"/>
          <label>Notes</label><input id="lNotes" placeholder="Any issues found?"/>
          <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="logCleaning()">✅ Log Cleaning</button>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="panel-history">
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <select id="hTable" onchange="loadHistory()" style="width:150px"><option value="">All Tables</option></select>
      <select id="hType" onchange="loadHistory()" style="width:150px">
        <option value="">All Types</option>
        <option value="STANDARD">Standard</option>
        <option value="DEEP">Deep</option>
        <option value="SANITIZE">Sanitize</option>
        <option value="POST_EVENT">Post-event</option>
      </select>
      <input type="date" id="hFrom" onchange="loadHistory()" style="width:140px"/>
    </div>
    <div class="card">
      <div id="historyList">Loading...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});
let tables=[];

async function init(){
  const r=await fetch('/api/tables',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  tables=d.tables||d;
  [document.getElementById('lTable'),document.getElementById('hTable')].forEach((sel,idx)=>{
    sel.innerHTML=idx===0?'<option value="">Select table...</option>':'<option value="">All Tables</option>';
    tables.filter(t=>t.active!==false).sort((a,b)=>a.number-b.number).forEach(t=>{
      const o=document.createElement('option');o.value=t.number;o.textContent=`Table ${t.number} (${t.capacity} seats)`;sel.appendChild(o);
    });
  });
  loadStats();loadBoard();
}

async function loadStats(){
  const r=await fetch('/api/table-hygiene/stats',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  document.getElementById('s-today').textContent=d.totalToday;
  document.getElementById('s-deep').textContent=d.deepToday;
  // stale/overdue computed from board
}

async function loadBoard(){
  const r=await fetch('/api/table-hygiene/board',{headers:authH(),cache:'no-store'});
  const board=await r.json();
  const now=Date.now();
  let stale=0,overdue=0;
  document.getElementById('boardGrid').innerHTML=`<div class="table-grid">${board.map(t=>{
    let cls='',timeLabel='Never logged';
    if(t.lastCleaned){
      const diffH=(now-new Date(t.lastCleaned.cleanedAt))/3600000;
      if(diffH<1){cls='clean';timeLabel=`${Math.round(diffH*60)}m ago`;}
      else if(diffH<3){cls='stale';timeLabel=`${diffH.toFixed(1)}h ago`;stale++;}
      else{cls='overdue';timeLabel=`${diffH.toFixed(1)}h ago`;overdue++;}
    }
    return `<div class="table-tile ${cls}" onclick="quickLog(${t.tableNumber})">
      <div class="table-num">🪑 ${t.tableNumber}</div>
      <div style="font-size:11px;font-weight:700;color:var(--muted)">Cap: ${t.capacity}</div>
      <div class="table-time">${timeLabel}</div>
      ${t.lastCleaned?`<div style="font-size:10px;color:var(--muted)">${t.lastCleaned.cleanedBy||'Unknown'}</div>`:''}
    </div>`;
  }).join('')}</div>`;
  document.getElementById('s-stale').textContent=stale;
  document.getElementById('s-overdue').textContent=overdue;
}

async function quickLog(tableNum){
  const staff=prompt(`Quick log for Table ${tableNum} — cleaned by:`);
  if(!staff)return;
  await fetch('/api/table-hygiene',{method:'POST',headers:authH(),body:JSON.stringify({tableNumber:tableNum,cleanedBy:staff,type:'STANDARD',duration:5})});
  showToast(`Table ${tableNum} logged clean!`,'success');loadStats();loadBoard();
}

async function logCleaning(){
  const tableNumber=document.getElementById('lTable').value;
  const cleanedBy=document.getElementById('lStaff').value.trim();
  if(!tableNumber||!cleanedBy){showToast('Table and staff name required','error');return;}
  const body={tableNumber:parseInt(tableNumber),cleanedBy,type:document.getElementById('lType').value,duration:parseInt(document.getElementById('lDuration').value)||5,notes:document.getElementById('lNotes').value};
  const r=await fetch('/api/table-hygiene',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Cleaning logged!','success');document.getElementById('lStaff').value='';document.getElementById('lNotes').value='';loadStats();loadBoard();}
  else showToast(d.message||'Error','error');
}

async function loadHistory(){
  const tableNumber=document.getElementById('hTable').value;
  const type=document.getElementById('hType').value;
  const from=document.getElementById('hFrom').value;
  let url='/api/table-hygiene?a=1';
  if(tableNumber)url+=`&tableNumber=${tableNumber}`;if(type)url+=`&type=${type}`;if(from)url+=`&from=${from}`;
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const logs=await r.json();
  if(!logs.length){document.getElementById('historyList').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No logs found</div>';return;}
  document.getElementById('historyList').innerHTML=logs.map(l=>`
    <div class="log-row">
      <div>
        <strong>Table ${l.tableNumber}</strong>
        <span class="type-chip t-${l.type}" style="margin-left:8px">${l.type.replace(/_/g,' ')}</span>
        ${l.cleanedBy?`<span style="font-size:12px;color:var(--muted);margin-left:8px">by ${l.cleanedBy}</span>`:''}
        ${l.notes?`<span style="font-size:11px;color:var(--muted);margin-left:8px">${l.notes}</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--muted)">${new Date(l.cleanedAt).toLocaleString()}</span>
        ${l.duration?`<span style="font-size:11px;color:var(--muted)">${l.duration}m</span>`:''}
        <button class="btn btn-red" style="font-size:11px;padding:3px 8px" onclick="delLog(${l.id})">Del</button>
      </div>
    </div>`).join('');
}

async function delLog(id){
  if(!confirm('Delete?'))return;
  await fetch(`/api/table-hygiene/${id}`,{method:'DELETE',headers:authH()});
  loadHistory();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['board','log','history'][i]===tab));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',['panel-board','panel-log','panel-history'][i]==='panel-'+tab));
  if(tab==='history')loadHistory();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

init();
setInterval(()=>{if(document.getElementById('panel-board').classList.contains('active'))loadBoard();},60000);
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
