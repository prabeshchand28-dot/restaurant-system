<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#f97316"/><link rel="apple-touch-icon" href="/icons/icon-192.png"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Uena"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Meal Subscriptions</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--purple:#6a1b9a;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1200px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .num{font-size:20px;font-weight:900}.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.card-body{padding:16px}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px}
.tab{padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted)}
.tab.active{border-bottom-color:var(--blue);color:var(--blue)}
.pane{display:none}.pane.active{display:block}
.two-col{display:grid;grid-template-columns:360px 1fr;gap:20px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}
.plan-card{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.plan-top{background:linear-gradient(135deg,var(--purple),#8e24aa);color:#fff;padding:16px}
.plan-name{font-size:17px;font-weight:900}
.plan-price{font-size:28px;font-weight:900;margin-top:4px}
.plan-meta{font-size:12px;opacity:.8;margin-top:2px}
.plan-body{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.sub-card{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:800}
.s-ACTIVE{background:#e7f5ed;color:var(--green)}.s-PAUSED{background:#fff3e0;color:var(--orange)}.s-CANCELLED{background:#fce8e7;color:var(--red)}.s-EXPIRED{background:#f0f0f0;color:#888}
.dur-WEEKLY{background:#e8efff;color:var(--blue)}.dur-MONTHLY{background:#e7f5ed;color:var(--green)}.dur-QUARTERLY{background:#f0e8ff;color:var(--purple)}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Meal Subscriptions</span></span>
  <div><a class="nav-btn" href="/crm">👥 CRM</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="stats">
    <div class="stat"><div class="num" id="s-active" style="color:var(--green)">—</div><div class="lbl">Active Subscribers</div></div>
    <div class="stat"><div class="num" id="s-paused" style="color:var(--orange)">—</div><div class="lbl">Paused</div></div>
    <div class="stat"><div class="num" id="s-expired" style="color:var(--muted)">—</div><div class="lbl">Expired</div></div>
    <div class="stat"><div class="num" id="s-revenue" style="color:var(--blue)">—</div><div class="lbl">Total Revenue (रू)</div></div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('plans',this)">📋 Plans</div>
    <div class="tab" onclick="switchTab('subscribers',this)">👥 Subscribers</div>
    <div class="tab" onclick="switchTab('new-sub',this)">➕ New Subscription</div>
  </div>

  <!-- Plans Tab -->
  <div id="pane-plans" class="pane active">
    <div class="two-col">
      <div class="card">
        <div class="card-header">➕ Create Plan</div>
        <div class="card-body">
          <label>Plan Name</label><input id="pName" placeholder="e.g. Lunch Box Monthly"/>
          <label>Duration</label>
          <select id="pDuration">
            <option value="WEEKLY">📅 Weekly</option>
            <option value="MONTHLY" selected>📆 Monthly</option>
            <option value="QUARTERLY">🗓️ Quarterly</option>
          </select>
          <div style="display:flex;gap:8px">
            <div style="flex:1"><label>Meals/Day</label><input type="number" id="pMeals" value="1" min="1"/></div>
            <div style="flex:1"><label>Days/Week</label><input type="number" id="pDays" value="5" min="1" max="7"/></div>
          </div>
          <label>Price (रू)</label><input type="number" id="pPrice" placeholder="e.g. 8000"/>
          <label>Includes (meal types)</label><input id="pIncludes" placeholder="e.g. Lunch, Dal Bhat, Snack"/>
          <label>Description</label><input id="pDesc" placeholder="What's included..."/>
          <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="createPlan()">Create Plan</button>
        </div>
      </div>
      <div id="planList">Loading...</div>
    </div>
  </div>

  <!-- Subscribers Tab -->
  <div id="pane-subscribers" class="pane">
    <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <select id="fSubStatus" onchange="loadSubs()" style="width:140px">
        <option value="ACTIVE">Active</option>
        <option value="">All Status</option>
        <option value="PAUSED">Paused</option>
        <option value="EXPIRED">Expired</option>
        <option value="CANCELLED">Cancelled</option>
      </select>
      <select id="fPlan" onchange="loadSubs()" style="width:180px"><option value="">All Plans</option></select>
    </div>
    <div id="subList">Loading...</div>
  </div>

  <!-- New Subscription Tab -->
  <div id="pane-new-sub" class="pane">
    <div style="max-width:500px">
      <div class="card">
        <div class="card-header">👤 New Subscription</div>
        <div class="card-body">
          <label>Customer Name</label><input id="nsName" placeholder="Full name"/>
          <label>Phone</label><input id="nsPhone" type="tel" placeholder="Phone number"/>
          <label>Plan</label>
          <select id="nsPlan"><option value="">Select plan...</option></select>
          <label>Start Date</label><input type="date" id="nsStart"/>
          <label>Amount Paid (रू)</label><input type="number" id="nsPaid" placeholder="Full or partial payment"/>
          <label>Notes</label><input id="nsNotes" placeholder="Dietary preferences, delivery notes..."/>
          <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="createSub()">Subscribe Customer</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});
let allPlans=[];

async function init(){
  await loadPlans();
  loadSubs();
  loadStats();
  document.getElementById('nsStart').value=new Date().toISOString().split('T')[0];
}

async function loadStats(){
  const r=await fetch('/api/subscriptions/stats',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  document.getElementById('s-active').textContent=d.active;
  document.getElementById('s-paused').textContent=d.paused;
  document.getElementById('s-expired').textContent=d.expired;
  document.getElementById('s-revenue').textContent='रू '+Math.round(d.totalRevenue).toLocaleString();
}

async function loadPlans(){
  const r=await fetch('/api/subscriptions/plans',{headers:authH(),cache:'no-store'});
  allPlans=await r.json();
  // populate selects
  [document.getElementById('nsPlan'),document.getElementById('fPlan')].forEach((sel,idx)=>{
    const placeholder=idx===0?'<option value="">Select plan...</option>':'<option value="">All Plans</option>';
    sel.innerHTML=placeholder;
    allPlans.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=`${p.name} (${p.duration}) — रू ${p.price}`;sel.appendChild(o);});
  });
  if(!allPlans.length){document.getElementById('planList').innerHTML='<div style="text-align:center;padding:40px;background:var(--white);border-radius:12px;color:var(--muted)">No plans yet. Create one.</div>';return;}
  document.getElementById('planList').innerHTML=allPlans.map(p=>`
    <div class="plan-card">
      <div class="plan-top">
        <div class="plan-name">${p.name}</div>
        <div class="plan-price">रू ${p.price.toLocaleString()}</div>
        <div class="plan-meta">${p.mealsPerDay} meal${p.mealsPerDay>1?'s':''}/day · ${p.daysPerWeek} days/week · ${p.duration}</div>
        ${p.includes?`<div style="font-size:11px;opacity:.8;margin-top:4px">Includes: ${p.includes}</div>`:''}
      </div>
      <div class="plan-body">
        <div>
          <span class="badge dur-${p.duration}">${p.duration}</span>
          <span style="font-size:12px;color:var(--muted);margin-left:8px">${p._count?.subscriptions||0} active subs</span>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn" style="font-size:11px;padding:5px 10px;background:${p.active?'#f0f0f0':'var(--green)'};color:${p.active?'#555':'#fff'}" onclick="togglePlan(${p.id},${!p.active})">${p.active?'Deactivate':'Activate'}</button>
          <button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="deletePlan(${p.id})">Del</button>
        </div>
      </div>
    </div>`).join('');
}

async function loadSubs(){
  const status=document.getElementById('fSubStatus').value;
  const planId=document.getElementById('fPlan').value;
  let url='/api/subscriptions?a=1';
  if(status)url+=`&status=${status}`;if(planId)url+=`&planId=${planId}`;
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const subs=await r.json();
  if(!subs.length){document.getElementById('subList').innerHTML='<div style="text-align:center;padding:60px;background:var(--white);border-radius:12px;color:var(--muted)">No subscriptions found</div>';return;}
  document.getElementById('subList').innerHTML=subs.map(s=>`
    <div class="sub-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:800;font-size:14px">👤 ${s.customerName}</div>
          <div style="font-size:12px;color:var(--muted)">${s.plan?.name||'—'} · ${s.customerPhone||'No phone'}</div>
          <div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap">
            <span class="badge s-${s.status}">${s.status}</span>
            <span class="badge dur-${s.plan?.duration||'MONTHLY'}">${s.plan?.duration||'—'}</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:16px;font-weight:900;color:var(--blue)">रू ${s.amountPaid.toLocaleString()}</div>
          <div style="font-size:11px;color:var(--muted)">${new Date(s.startDate).toLocaleDateString()} → ${new Date(s.endDate).toLocaleDateString()}</div>
        </div>
      </div>
      ${s.notes?`<div style="font-size:12px;color:var(--muted);margin-top:6px;font-style:italic">💬 ${s.notes}</div>`:''}
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
        ${s.status==='ACTIVE'?`<button class="btn" style="font-size:11px;padding:4px 10px;background:#fff3e0;color:var(--orange)" onclick="updateSub(${s.id},'PAUSED')">⏸ Pause</button>`:''}
        ${s.status==='PAUSED'?`<button class="btn btn-green" style="font-size:11px;padding:4px 10px" onclick="updateSub(${s.id},'ACTIVE')">▶ Resume</button>`:''}
        ${s.status!=='CANCELLED'?`<button class="btn btn-red" style="font-size:11px;padding:4px 10px" onclick="updateSub(${s.id},'CANCELLED')">Cancel</button>`:''}
      </div>
    </div>`).join('');
}

async function createPlan(){
  const name=document.getElementById('pName').value.trim();
  const price=document.getElementById('pPrice').value;
  if(!name||!price){showToast('Name and price required','error');return;}
  const body={name,duration:document.getElementById('pDuration').value,mealsPerDay:parseInt(document.getElementById('pMeals').value),daysPerWeek:parseInt(document.getElementById('pDays').value),price:parseFloat(price),includes:document.getElementById('pIncludes').value,description:document.getElementById('pDesc').value};
  const r=await fetch('/api/subscriptions/plans',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Plan created!','success');document.getElementById('pName').value='';document.getElementById('pPrice').value='';document.getElementById('pIncludes').value='';loadPlans();loadStats();}
  else showToast(d.message||'Error','error');
}

async function togglePlan(id,active){
  await fetch(`/api/subscriptions/plans/${id}`,{method:'PATCH',headers:authH(),body:JSON.stringify({active})});
  loadPlans();
}

async function deletePlan(id){
  if(!confirm('Delete this plan? Existing subscriptions will be affected.'))return;
  await fetch(`/api/subscriptions/plans/${id}`,{method:'DELETE',headers:authH()});
  loadPlans();
}

async function createSub(){
  const planId=document.getElementById('nsPlan').value;
  const customerName=document.getElementById('nsName').value.trim();
  const startDate=document.getElementById('nsStart').value;
  if(!planId||!customerName||!startDate){showToast('Plan, name and start date required','error');return;}
  const body={planId,customerName,customerPhone:document.getElementById('nsPhone').value,startDate,amountPaid:parseFloat(document.getElementById('nsPaid').value)||0,notes:document.getElementById('nsNotes').value};
  const r=await fetch('/api/subscriptions',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Subscription created!','success');document.getElementById('nsName').value='';document.getElementById('nsPhone').value='';document.getElementById('nsPaid').value='';loadSubs();loadStats();}
  else showToast(d.message||'Error','error');
}

async function updateSub(id,status){
  const r=await fetch(`/api/subscriptions/${id}`,{method:'PATCH',headers:authH(),body:JSON.stringify({status})});
  if((await r.json()).id){showToast('Updated!','success');loadSubs();loadStats();}
}

function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');document.getElementById('pane-'+id).classList.add('active');
  if(id==='subscribers')loadSubs();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

init();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
