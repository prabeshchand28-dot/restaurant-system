<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#f97316"/><link rel="apple-touch-icon" href="/icons/icon-192.png"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Uena"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Staff Meal Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1100px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .num{font-size:20px;font-weight:900}.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.grid{display:grid;grid-template-columns:300px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}
.meal-row{border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.meal-row:last-child{border-bottom:none}
.badge{display:inline-block;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:800}
.mt-DUTY_MEAL{background:#e8efff;color:var(--blue)}.mt-BREAK_SNACK{background:#e7f5ed;color:var(--green)}.mt-MANAGEMENT{background:#f3e5f5;color:#6c3483}
.shift-chip{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:#f0f0f0;color:#555}
.report-row{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px}
.report-row:last-child{border-bottom:none}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Staff Meal Tracker</span></span>
  <div><a class="nav-btn" href="/staff">👤 Staff</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="stats">
    <div class="stat"><div class="num" id="s-count" style="color:var(--navy)">—</div><div class="lbl">Meals Today</div></div>
    <div class="stat"><div class="num" id="s-cost" style="color:var(--red)">—</div><div class="lbl">Cost Today (रू)</div></div>
    <div class="stat"><div class="num" id="s-month" style="color:var(--orange)">—</div><div class="lbl">Cost This Month (रू)</div></div>
  </div>
  <div class="grid">
    <div>
      <div class="card">
        <div class="card-header">🍛 Log Staff Meal</div>
        <div class="card-body">
          <label>Staff Member</label>
          <select id="mStaff"><option value="">Select staff...</option></select>
          <label>Shift</label>
          <select id="mShift">
            <option value="MORNING">☀️ Morning</option>
            <option value="AFTERNOON">🌤️ Afternoon</option>
            <option value="EVENING">🌙 Evening</option>
          </select>
          <label>Meal Type</label>
          <select id="mType">
            <option value="DUTY_MEAL">🍛 Duty Meal</option>
            <option value="BREAK_SNACK">☕ Break Snack</option>
            <option value="MANAGEMENT">👔 Management</option>
          </select>
          <label>Items Consumed</label><input id="mItems" placeholder="e.g. Dal bhat, 1 lassi"/>
          <label>Value (रू)</label><input type="number" id="mValue" placeholder="0" min="0"/>
          <label>Approved By</label><input id="mApproved" placeholder="Manager name"/>
          <label>Notes</label><input id="mNotes" placeholder="Optional..."/>
          <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="logMeal()">🍛 Log Meal</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header">📊 Staff Report</div>
        <div class="card-body">
          <label>From</label><input type="date" id="rFrom"/>
          <label>To</label><input type="date" id="rTo"/>
          <button class="btn" style="width:100%;margin-top:10px" onclick="loadReport()">Generate Report</button>
          <div id="reportOut" style="margin-top:12px"></div>
        </div>
      </div>
    </div>
    <div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <input type="date" id="fDate" onchange="loadMeals()" style="width:150px"/>
        <select id="fShift" onchange="loadMeals()" style="width:130px">
          <option value="">All Shifts</option>
          <option value="MORNING">Morning</option>
          <option value="AFTERNOON">Afternoon</option>
          <option value="EVENING">Evening</option>
        </select>
        <select id="fStaff" onchange="loadMeals()" style="width:160px"><option value="">All Staff</option></select>
      </div>
      <div class="card">
        <div id="mealList"><div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});

const today=new Date().toISOString().slice(0,10);
document.getElementById('fDate').value=today;

async function init(){
  const r=await fetch('/api/staff',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  const staff=d.data||d;
  [document.getElementById('mStaff'),document.getElementById('fStaff')].forEach((sel,idx)=>{
    sel.innerHTML=idx===0?'<option value="">Select staff...</option>':'<option value="">All Staff</option>';
    staff.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.dataset.name=s.name;o.textContent=s.name;sel.appendChild(o);});
  });
  loadStats();loadMeals();
}

async function loadStats(){
  const r=await fetch('/api/staff-meals/stats',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  document.getElementById('s-count').textContent=d.countToday;
  document.getElementById('s-cost').textContent='रू '+Math.round(d.costToday).toLocaleString();
  document.getElementById('s-month').textContent='रू '+Math.round(d.costMonth).toLocaleString();
}

async function loadMeals(){
  const date=document.getElementById('fDate').value;
  const shift=document.getElementById('fShift').value;
  const staffId=document.getElementById('fStaff').value;
  let url='/api/staff-meals?a=1';
  if(date)url+=`&date=${date}`;if(shift)url+=`&shift=${shift}`;if(staffId)url+=`&staffId=${staffId}`;
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const meals=await r.json();
  if(!meals.length){document.getElementById('mealList').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No meals logged for this day</div>';return;}
  const total=meals.reduce((s,m)=>s+m.value,0);
  document.getElementById('mealList').innerHTML=`
    <div style="padding:10px 14px;background:#f8f9fc;font-size:12px;font-weight:700;border-bottom:1px solid var(--border)">
      ${meals.length} meals · Total: <strong>रू ${Math.round(total).toLocaleString()}</strong>
    </div>
    ${meals.map(m=>`<div class="meal-row">
      <div>
        <div style="font-weight:800;font-size:13px">👤 ${m.staffName}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${m.items||'—'}</div>
        <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap">
          <span class="badge mt-${m.mealType}">${m.mealType.replace(/_/g,' ')}</span>
          <span class="shift-chip">${m.shift}</span>
          ${m.approvedBy?`<span style="font-size:11px;color:var(--muted)">✓ ${m.approvedBy}</span>`:''}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${m.value>0?`<span style="font-weight:900;font-size:16px;color:var(--red)">रू ${m.value}</span>`:'<span style="color:var(--muted);font-size:12px">No value</span>'}
        <button class="btn btn-red" style="font-size:11px;padding:4px 9px" onclick="delMeal(${m.id})">Del</button>
      </div>
    </div>`).join('')}`;
}

async function logMeal(){
  const staffSel=document.getElementById('mStaff');
  const staffId=staffSel.value;
  if(!staffId){showToast('Select staff','error');return;}
  const staffName=staffSel.options[staffSel.selectedIndex].dataset.name||'';
  const body={staffId,staffName,shift:document.getElementById('mShift').value,mealType:document.getElementById('mType').value,items:document.getElementById('mItems').value,value:document.getElementById('mValue').value||0,approvedBy:document.getElementById('mApproved').value,notes:document.getElementById('mNotes').value};
  const r=await fetch('/api/staff-meals',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Logged!','success');document.getElementById('mItems').value='';document.getElementById('mValue').value='';document.getElementById('mNotes').value='';loadStats();loadMeals();}
  else showToast(d.message||'Error','error');
}

async function delMeal(id){
  if(!confirm('Delete?'))return;
  await fetch(`/api/staff-meals/${id}`,{method:'DELETE',headers:authH()});
  loadStats();loadMeals();
}

async function loadReport(){
  const from=document.getElementById('rFrom').value;
  const to=document.getElementById('rTo').value;
  if(!from){showToast('Select date range','error');return;}
  const r=await fetch(`/api/staff-meals/report?from=${from}${to?'&to='+to:''}`,{headers:authH(),cache:'no-store'});
  const d=await r.json();
  if(!Object.keys(d.byStaff).length){document.getElementById('reportOut').innerHTML='<div style="color:var(--muted);font-size:12px">No data</div>';return;}
  const total=Object.values(d.byStaff).reduce((s,v)=>s+v.total,0);
  document.getElementById('reportOut').innerHTML=`<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden">${Object.entries(d.byStaff).map(([name,v])=>`<div class="report-row"><span style="font-weight:700">${name}</span><span>${v.count} meals · <strong>रू ${Math.round(v.total).toLocaleString()}</strong></span></div>`).join('')}<div class="report-row" style="background:#f8f9fc;font-weight:800"><span>TOTAL</span><span>रू ${Math.round(total).toLocaleString()}</span></div></div>`;
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

init();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
