<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Equipment Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1200px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .num{font-size:22px;font-weight:900}.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.grid{display:grid;grid-template-columns:340px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}
.asset-card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;background:var(--white)}
.asset-card.warning{border-left:4px solid var(--orange)}
.asset-card.faulty{border-left:4px solid var(--red)}
.asset-name{font-weight:900;font-size:14px}
.asset-sub{font-size:12px;color:var(--muted);margin-top:2px}
.badge{display:inline-block;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:800}
.s-OPERATIONAL{background:#e7f5ed;color:var(--green)}.s-MAINTENANCE{background:#fff3e0;color:var(--orange)}.s-FAULTY{background:#fce8e7;color:var(--red)}.s-RETIRED{background:#f0f0f0;color:#888}
.cat-badge{font-size:10px;background:#f0f0f0;border-radius:20px;padding:2px 7px;font-weight:700}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.info-item{font-size:12px}.info-item .k{color:var(--muted)}.info-item .v{font-weight:700}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--white);border-radius:14px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-head{background:var(--navy);color:#fff;padding:14px 18px;font-weight:800;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0}
.modal-body{padding:18px}
.hidden{display:none}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Equipment Tracker</span></span>
  <div><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="stats">
    <div class="stat"><div class="num" id="s-total">—</div><div class="lbl">Total Assets</div></div>
    <div class="stat"><div class="num" id="s-operational" style="color:var(--green)">—</div><div class="lbl">✅ Operational</div></div>
    <div class="stat"><div class="num" id="s-maintenance" style="color:var(--orange)">—</div><div class="lbl">🔧 Maintenance</div></div>
    <div class="stat"><div class="num" id="s-faulty" style="color:var(--red)">—</div><div class="lbl">⚠️ Faulty</div></div>
    <div class="stat"><div class="num" id="s-due" style="color:var(--orange)">—</div><div class="lbl">Due Maintenance (30d)</div></div>
  </div>

  <div class="grid">
    <!-- Create -->
    <div>
      <div class="card">
        <div class="card-header">➕ Add Equipment</div>
        <div class="card-body">
          <label>Name</label><input id="eName" placeholder="e.g. Walk-in Fridge #1"/>
          <label>Category</label>
          <select id="eCat">
            <option value="KITCHEN">🍳 Kitchen</option>
            <option value="REFRIGERATION">❄️ Refrigeration</option>
            <option value="POS">💻 POS / Tech</option>
            <option value="FURNITURE">🪑 Furniture</option>
            <option value="HVAC">🌬️ HVAC</option>
            <option value="OTHER">📦 Other</option>
          </select>
          <div style="display:flex;gap:8px">
            <div style="flex:1"><label>Brand</label><input id="eBrand" placeholder="e.g. Samsung"/></div>
            <div style="flex:1"><label>Model</label><input id="eModel" placeholder="Model #"/></div>
          </div>
          <label>Serial Number</label><input id="eSerial" placeholder="SN-12345"/>
          <label>Location</label><input id="eLocation" placeholder="e.g. Kitchen, Bar, Storage"/>
          <label>Purchase Date</label><input type="date" id="ePurchaseDate"/>
          <label>Purchase Price (रू)</label><input type="number" id="ePrice" placeholder="0"/>
          <label>Warranty Expiry</label><input type="date" id="eWarranty"/>
          <label>Next Maintenance</label><input type="date" id="eNextMaint"/>
          <label>Status</label>
          <select id="eStatus">
            <option value="OPERATIONAL">Operational</option>
            <option value="MAINTENANCE">Under Maintenance</option>
            <option value="FAULTY">Faulty</option>
            <option value="RETIRED">Retired</option>
          </select>
          <label>Notes</label><input id="eNotes" placeholder="Any notes..."/>
          <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="createAsset()">Add Asset</button>
        </div>
      </div>
    </div>

    <!-- List -->
    <div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <select id="fCat" onchange="loadAssets()" style="width:140px">
          <option value="">All Categories</option>
          <option value="KITCHEN">Kitchen</option>
          <option value="REFRIGERATION">Refrigeration</option>
          <option value="POS">POS / Tech</option>
          <option value="FURNITURE">Furniture</option>
          <option value="HVAC">HVAC</option>
          <option value="OTHER">Other</option>
        </select>
        <select id="fStatus" onchange="loadAssets()" style="width:130px">
          <option value="">All Status</option>
          <option value="OPERATIONAL">Operational</option>
          <option value="MAINTENANCE">Maintenance</option>
          <option value="FAULTY">Faulty</option>
          <option value="RETIRED">Retired</option>
        </select>
        <input id="fSearch" placeholder="Search name or brand..." style="width:180px" oninput="loadAssets()"/>
      </div>
      <div id="assetList">Loading...</div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal-bg hidden">
  <div class="modal">
    <div class="modal-head"><span>Edit Asset</span><button onclick="closeModal()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="eId"/>
      <label>Status</label>
      <select id="eEditStatus">
        <option value="OPERATIONAL">Operational</option>
        <option value="MAINTENANCE">Under Maintenance</option>
        <option value="FAULTY">Faulty</option>
        <option value="RETIRED">Retired</option>
      </select>
      <label>Last Maintenance</label><input type="date" id="eLastMaint"/>
      <label>Next Maintenance</label><input type="date" id="eNextMaintEdit"/>
      <label>Notes</label><input id="eNotesEdit"/>
      <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});
const catEmoji={KITCHEN:'🍳',REFRIGERATION:'❄️',POS:'💻',FURNITURE:'🪑',HVAC:'🌬️',OTHER:'📦'};

async function loadStats(){
  const r=await fetch('/api/equipment/stats',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  document.getElementById('s-total').textContent=d.total;
  document.getElementById('s-operational').textContent=d.operational;
  document.getElementById('s-maintenance').textContent=d.maintenance;
  document.getElementById('s-faulty').textContent=d.faulty;
  document.getElementById('s-due').textContent=d.dueSoon;
}

async function loadAssets(){
  const cat=document.getElementById('fCat').value;
  const status=document.getElementById('fStatus').value;
  const search=document.getElementById('fSearch').value;
  let url='/api/equipment?a=1';
  if(cat)url+=`&category=${cat}`;if(status)url+=`&status=${status}`;if(search)url+=`&search=${encodeURIComponent(search)}`;
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const assets=await r.json();
  if(!assets.length){document.getElementById('assetList').innerHTML='<div style="text-align:center;padding:60px;background:var(--white);border-radius:12px;color:var(--muted)">No assets found</div>';return;}
  const now=new Date();const thirtyDays=new Date();thirtyDays.setDate(thirtyDays.getDate()+30);
  document.getElementById('assetList').innerHTML=assets.map(a=>{
    const mDue=a.nextMaintenanceAt&&new Date(a.nextMaintenanceAt)<thirtyDays&&new Date(a.nextMaintenanceAt)>now;
    const wExpired=a.warrantyExpiry&&new Date(a.warrantyExpiry)<now;
    return `<div class="asset-card ${a.status==='FAULTY'?'faulty':mDue?'warning':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="asset-name">${catEmoji[a.category]||'📦'} ${a.name}</div>
          <div class="asset-sub">${a.brand?a.brand+' ':''} ${a.model||''} ${a.serialNo?'· SN: '+a.serialNo:''}</div>
          <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap">
            <span class="badge s-${a.status}">${a.status}</span>
            <span class="cat-badge">${a.category}</span>
            ${a.location?`<span class="cat-badge">📍 ${a.location}</span>`:''}
            ${mDue?'<span class="badge" style="background:#fff3e0;color:var(--orange)">⚠️ Maintenance Due</span>':''}
          </div>
        </div>
        <div style="display:flex;gap:5px">
          <button class="btn" style="font-size:11px;padding:5px 10px" onclick="openEdit(${JSON.stringify(a).replace(/"/g,'&quot;')})">Edit</button>
          <button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="deleteAsset(${a.id})">Del</button>
        </div>
      </div>
      <div class="info-grid">
        ${a.purchaseDate?`<div class="info-item"><div class="k">Purchased</div><div class="v">${new Date(a.purchaseDate).toLocaleDateString()}</div></div>`:''}
        ${a.purchasePrice?`<div class="info-item"><div class="k">Value</div><div class="v">रू ${a.purchasePrice.toLocaleString()}</div></div>`:''}
        ${a.warrantyExpiry?`<div class="info-item"><div class="k">Warranty</div><div class="v" style="${wExpired?'color:var(--red)':''}">${new Date(a.warrantyExpiry).toLocaleDateString()}${wExpired?' (Expired)':''}</div></div>`:''}
        ${a.nextMaintenanceAt?`<div class="info-item"><div class="k">Next Maintenance</div><div class="v" style="${mDue?'color:var(--orange)':''}">${new Date(a.nextMaintenanceAt).toLocaleDateString()}</div></div>`:''}
        ${a.lastMaintenanceAt?`<div class="info-item"><div class="k">Last Serviced</div><div class="v">${new Date(a.lastMaintenanceAt).toLocaleDateString()}</div></div>`:''}
        ${a.notes?`<div class="info-item" style="grid-column:span 2"><div class="k">Notes</div><div class="v">${a.notes}</div></div>`:''}
      </div>
    </div>`;
  }).join('');
}

async function createAsset(){
  const name=document.getElementById('eName').value.trim();
  if(!name){showToast('Name required','error');return;}
  const body={name,category:document.getElementById('eCat').value,brand:document.getElementById('eBrand').value,model:document.getElementById('eModel').value,serialNo:document.getElementById('eSerial').value,location:document.getElementById('eLocation').value,purchaseDate:document.getElementById('ePurchaseDate').value||null,purchasePrice:parseFloat(document.getElementById('ePrice').value)||0,warrantyExpiry:document.getElementById('eWarranty').value||null,nextMaintenanceAt:document.getElementById('eNextMaint').value||null,status:document.getElementById('eStatus').value,notes:document.getElementById('eNotes').value};
  const r=await fetch('/api/equipment',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Asset added!','success');document.getElementById('eName').value='';document.getElementById('eBrand').value='';document.getElementById('eModel').value='';document.getElementById('eSerial').value='';loadAssets();loadStats();}
  else showToast(d.message||'Error','error');
}

function openEdit(a){
  document.getElementById('eId').value=a.id;
  document.getElementById('eEditStatus').value=a.status;
  document.getElementById('eLastMaint').value=a.lastMaintenanceAt?a.lastMaintenanceAt.split('T')[0]:'';
  document.getElementById('eNextMaintEdit').value=a.nextMaintenanceAt?a.nextMaintenanceAt.split('T')[0]:'';
  document.getElementById('eNotesEdit').value=a.notes||'';
  document.getElementById('editModal').classList.remove('hidden');
}
function closeModal(){document.getElementById('editModal').classList.add('hidden');}

async function saveEdit(){
  const id=document.getElementById('eId').value;
  const body={status:document.getElementById('eEditStatus').value,lastMaintenanceAt:document.getElementById('eLastMaint').value||null,nextMaintenanceAt:document.getElementById('eNextMaintEdit').value||null,notes:document.getElementById('eNotesEdit').value};
  const r=await fetch(`/api/equipment/${id}`,{method:'PATCH',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Saved!','success');closeModal();loadAssets();loadStats();}
  else showToast(d.message||'Error','error');
}

async function deleteAsset(id){
  if(!confirm('Delete this asset?'))return;
  await fetch(`/api/equipment/${id}`,{method:'DELETE',headers:authH()});
  loadAssets();loadStats();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

loadStats();loadAssets();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
