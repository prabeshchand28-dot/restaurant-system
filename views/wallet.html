<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Wallet & Membership</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--gold:#b8860b;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.tabs{display:flex;background:var(--white);border-bottom:2px solid var(--border)}
.tab{padding:12px 24px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:var(--muted)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.content{padding:24px;max-width:1100px;margin:0 auto}
.pane{display:none}.pane.active{display:block}
.grid{display:grid;grid-template-columns:360px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input,select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-primary{background:var(--blue);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px;font-weight:700;border:none;border-radius:4px;cursor:pointer;font-family:var(--font)}
.wallet-card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;background:linear-gradient(135deg,#f8f9fb,#fff)}
.balance-badge{font-size:22px;font-weight:900;color:var(--green)}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.tx-amount{font-weight:700}.tx-amount.credit{color:var(--green)}.tx-amount.debit{color:var(--red)}
.tier-card{border-radius:10px;padding:16px;margin-bottom:10px;color:#fff;position:relative;overflow:hidden}
.tier-card.BRONZE{background:linear-gradient(135deg,#cd7f32,#a0522d)}
.tier-card.SILVER{background:linear-gradient(135deg,#a8a9ad,#6b6b6b)}
.tier-card.GOLD{background:linear-gradient(135deg,#d4af37,#b8860b)}
.tier-card.PLATINUM{background:linear-gradient(135deg,#1a3a6b,#2653a0)}
.tier-card .tier-name{font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:1px}
.tier-card .tier-disc{font-size:13px;opacity:.9;margin-top:4px}
.membership-item{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:800;text-transform:uppercase}
.badge-gold{background:#fff8e1;color:var(--gold)}
.badge-green{background:#e7f5ed;color:var(--green)}
.badge-blue{background:#e8efff;color:var(--blue)}
.badge-red{background:#fce8e7;color:var(--red)}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Wallet & Membership</span></span>
  <div><a class="nav-btn" href="/loyalty">⭐ Loyalty</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('wallet',this)">💳 Digital Wallets</div>
  <div class="tab" onclick="switchTab('membership',this)">🏅 Membership</div>
  <div class="tab" onclick="switchTab('tiers',this)">✨ Tier Benefits</div>
</div>
<div class="content">

  <!-- Wallets -->
  <div class="pane active" id="pane-wallet">
    <div class="grid">
      <div>
        <div class="card">
          <div class="card-header">🔍 Look Up / Create Wallet</div>
          <div class="card-body">
            <label>Customer Phone</label>
            <input id="wPhone" placeholder="+977-98XXXXXXXX" onkeydown="if(event.key==='Enter')lookupWallet()"/>
            <div style="display:flex;gap:8px;margin-top:10px">
              <button class="btn btn-primary" style="flex:1" onclick="lookupWallet()">Look Up</button>
              <button class="btn btn-green" style="flex:1" onclick="createWallet()">Create</button>
            </div>
            <div id="walletInfo" style="margin-top:16px"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header">💸 Top Up / Spend</div>
          <div class="card-body">
            <label>Phone</label>
            <input id="topPhone" placeholder="+977-98XXXXXXXX"/>
            <label>Amount (रू)</label>
            <input type="number" id="topAmount" placeholder="e.g. 500"/>
            <label>Reason / Note</label>
            <input id="topNote" placeholder="e.g. Prepaid credit"/>
            <div style="display:flex;gap:8px;margin-top:10px">
              <button class="btn btn-green" style="flex:1" onclick="topUp()">➕ Top Up</button>
              <button class="btn btn-red" style="flex:1" onclick="spend()">➖ Spend</button>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-header">💳 All Wallets</div>
          <div class="card-body" id="walletList">
            <div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Memberships -->
  <div class="pane" id="pane-membership">
    <div class="grid">
      <div>
        <div class="card">
          <div class="card-header">➕ Add Membership</div>
          <div class="card-body">
            <label>Customer Phone</label>
            <input id="mPhone" placeholder="+977-98XXXXXXXX"/>
            <label>Tier</label>
            <select id="mTier">
              <option value="BRONZE">🟫 Bronze</option>
              <option value="SILVER">⚪ Silver</option>
              <option value="GOLD">🟡 Gold</option>
              <option value="PLATINUM">💎 Platinum</option>
            </select>
            <label>Valid Until</label>
            <input type="date" id="mExpiry"/>
            <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="createMembership()">Add Membership</button>
          </div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-header">🏅 All Members</div>
          <div class="card-body" id="memberList">
            <div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tiers -->
  <div class="pane" id="pane-tiers">
    <div style="max-width:700px">
      <div class="card">
        <div class="card-header">✨ Membership Tier Benefits</div>
        <div class="card-body" id="tierList">
          <div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>
        </div>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});

const nextYear=new Date(); nextYear.setFullYear(nextYear.getFullYear()+1);
document.getElementById('mExpiry').value=nextYear.toISOString().slice(0,10);

function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pane-'+name).classList.add('active');
  if(name==='wallet') loadWallets();
  if(name==='membership') loadMemberships();
  if(name==='tiers') loadTiers();
}

async function loadWallets(){
  const r=await fetch('/api/wallet/wallets',{headers:authH(),cache:'no-store'});
  const data=await r.json();
  if(!data.length){
    document.getElementById('walletList').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No wallets yet</div>';
    return;
  }
  document.getElementById('walletList').innerHTML=data.map(w=>`
    <div class="wallet-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:13px;font-weight:700">${w.customerPhone}</div>
          <div class="balance-badge">रू ${(w.balance||0).toLocaleString()}</div>
        </div>
        <button class="btn-sm btn-primary" onclick="selectWallet('${w.customerPhone}')">View</button>
      </div>
    </div>`).join('');
}

function selectWallet(phone){
  document.getElementById('wPhone').value=phone;
  lookupWallet();
}

async function lookupWallet(){
  const phone=document.getElementById('wPhone').value.trim();
  if(!phone)return;
  const r=await fetch(`/api/wallet/wallets/${encodeURIComponent(phone)}`,{headers:authH(),cache:'no-store'});
  const d=await r.json();
  if(d.id){
    const txHtml=(d.transactions||[]).slice(0,5).map(t=>`
      <div class="tx-item">
        <span>${t.note||t.type}</span>
        <span class="tx-amount ${t.amount>0?'credit':'debit'}">${t.amount>0?'+':''}रू ${Math.abs(t.amount).toLocaleString()}</span>
      </div>`).join('');
    document.getElementById('walletInfo').innerHTML=`
      <div style="background:#f0f9f0;border:1px solid #a8d5b5;border-radius:8px;padding:12px">
        <div style="font-weight:700;margin-bottom:4px">${d.customerPhone}</div>
        <div class="balance-badge">Balance: रू ${(d.balance||0).toLocaleString()}</div>
        ${txHtml?`<div style="margin-top:10px;font-size:12px;font-weight:700;color:var(--navy)">Recent Transactions</div>${txHtml}`:''}
      </div>`;
    document.getElementById('topPhone').value=phone;
  }else{
    document.getElementById('walletInfo').innerHTML=`<div style="color:var(--red);font-size:13px">Wallet not found</div>`;
  }
}

async function createWallet(){
  const phone=document.getElementById('wPhone').value.trim();
  if(!phone){showToast('Enter phone number','error');return;}
  const r=await fetch('/api/wallet/wallets',{method:'POST',headers:authH(),body:JSON.stringify({customerPhone:phone})});
  const d=await r.json();
  if(d.id){showToast('Wallet created!','success');loadWallets();}
  else showToast(d.message||'Error','error');
}

async function topUp(){
  const phone=document.getElementById('topPhone').value.trim();
  const amount=Number(document.getElementById('topAmount').value);
  const note=document.getElementById('topNote').value.trim();
  if(!phone||!amount){showToast('Phone and amount required','error');return;}
  const r=await fetch('/api/wallet/wallets/topup',{method:'POST',headers:authH(),body:JSON.stringify({phone,amount,note})});
  const d=await r.json();
  if(d.balance!==undefined){showToast(`Topped up! Balance: रू ${d.balance.toLocaleString()}`,'success');loadWallets();}
  else showToast(d.message||'Error','error');
}

async function spend(){
  const phone=document.getElementById('topPhone').value.trim();
  const amount=Number(document.getElementById('topAmount').value);
  const note=document.getElementById('topNote').value.trim();
  if(!phone||!amount){showToast('Phone and amount required','error');return;}
  const r=await fetch('/api/wallet/wallets/spend',{method:'POST',headers:authH(),body:JSON.stringify({phone,amount,note})});
  const d=await r.json();
  if(d.balance!==undefined){showToast(`Spent! Remaining: रू ${d.balance.toLocaleString()}`,'success');loadWallets();}
  else showToast(d.message||'Insufficient balance','error');
}

async function loadMemberships(){
  const r=await fetch('/api/wallet/memberships',{headers:authH(),cache:'no-store'});
  const data=await r.json();
  if(!data.length){
    document.getElementById('memberList').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No members yet</div>';
    return;
  }
  const tierColors={BRONZE:'badge-red',SILVER:'badge-blue',GOLD:'badge-gold',PLATINUM:'badge-blue'};
  document.getElementById('memberList').innerHTML=data.map(m=>`
    <div class="membership-item">
      <div>
        <div style="font-weight:700;font-size:13px">${m.customerPhone}</div>
        <div style="margin-top:4px">
          <span class="badge ${tierColors[m.tier]||'badge-blue'}">${m.tier}</span>
          ${m.active?'<span class="badge badge-green" style="margin-left:4px">ACTIVE</span>':'<span class="badge badge-red" style="margin-left:4px">EXPIRED</span>'}
        </div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">Expires: ${m.expiresAt?.slice(0,10)}</div>
      </div>
      <div style="font-size:22px">
        ${m.tier==='BRONZE'?'🟫':m.tier==='SILVER'?'⚪':m.tier==='GOLD'?'🟡':'💎'}
      </div>
    </div>`).join('');
}

async function createMembership(){
  const body={
    customerPhone:document.getElementById('mPhone').value.trim(),
    tier:document.getElementById('mTier').value,
    expiresAt:document.getElementById('mExpiry').value,
  };
  if(!body.customerPhone){showToast('Enter phone number','error');return;}
  const r=await fetch('/api/wallet/memberships',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Membership added!','success');loadMemberships();}
  else showToast(d.message||'Error','error');
}

async function loadTiers(){
  const r=await fetch('/api/wallet/memberships/tiers',{headers:authH(),cache:'no-store'});
  const tiers=await r.json();
  document.getElementById('tierList').innerHTML=tiers.map(t=>`
    <div class="tier-card ${t.tier}">
      <div class="tier-name">${t.tier==='BRONZE'?'🟫':t.tier==='SILVER'?'⚪':t.tier==='GOLD'?'🟡':'💎'} ${t.tier}</div>
      <div class="tier-disc">
        ${t.discountPercent}% discount on all orders
        ${t.freeDelivery?' · Free delivery':''}
        ${t.prioritySupport?' · Priority support':''}
        ${t.birthdayBonus?' · Birthday bonus':''}
      </div>
      <div style="font-size:11px;opacity:.8;margin-top:6px">Min spend: रू ${(t.minSpend||0).toLocaleString()} to qualify</div>
    </div>`).join('');
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

loadWallets();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
