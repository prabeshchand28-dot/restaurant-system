<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#f97316"/><link rel="apple-touch-icon" href="/icons/icon-192.png"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Uena"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lost & Found</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1100px;margin:0 auto}
.grid{display:grid;grid-template-columns:300px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}
.lf-card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:800}
.s-UNCLAIMED{background:#fce8e7;color:var(--red)}.s-CLAIMED{background:#e7f5ed;color:var(--green)}.s-DONATED{background:#e8efff;color:var(--blue)}.s-DISPOSED{background:#f0f0f0;color:#888}
.cat-chip{font-size:10px;background:#f0f0f0;border-radius:20px;padding:2px 7px;font-weight:700}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Lost & Found</span></span>
  <div><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="grid">
    <div>
      <div class="card">
        <div class="card-header">🔍 Log Found Item</div>
        <div class="card-body">
          <label>Item Name</label><input id="lfName" placeholder="e.g. Blue umbrella, iPhone"/>
          <label>Category</label>
          <select id="lfCat">
            <option value="ELECTRONICS">📱 Electronics</option>
            <option value="CLOTHING">👗 Clothing</option>
            <option value="JEWELLERY">💍 Jewellery</option>
            <option value="DOCUMENTS">📄 Documents</option>
            <option value="OTHER" selected>📦 Other</option>
          </select>
          <label>Description</label><input id="lfDesc" placeholder="Colour, brand, distinguishing marks..."/>
          <label>Found At (location)</label><input id="lfLoc" placeholder="e.g. Table 7, Restroom, Parking"/>
          <label>Found By</label><input id="lfBy" placeholder="Staff name"/>
          <label>Notes</label><input id="lfNotes" placeholder="Any additional details..."/>
          <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="logItem()">Log Item</button>
        </div>
      </div>
    </div>

    <div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <select id="fStatus" onchange="loadItems()" style="width:140px">
          <option value="UNCLAIMED">Unclaimed</option>
          <option value="">All Items</option>
          <option value="CLAIMED">Claimed</option>
          <option value="DONATED">Donated</option>
          <option value="DISPOSED">Disposed</option>
        </select>
        <select id="fCat" onchange="loadItems()" style="width:140px">
          <option value="">All Categories</option>
          <option value="ELECTRONICS">Electronics</option>
          <option value="CLOTHING">Clothing</option>
          <option value="JEWELLERY">Jewellery</option>
          <option value="DOCUMENTS">Documents</option>
          <option value="OTHER">Other</option>
        </select>
      </div>
      <div id="itemList">Loading...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});
const catEmoji={ELECTRONICS:'📱',CLOTHING:'👗',JEWELLERY:'💍',DOCUMENTS:'📄',OTHER:'📦'};

async function loadItems(){
  const status=document.getElementById('fStatus').value;
  const cat=document.getElementById('fCat').value;
  let url='/api/lost-found?a=1';
  if(status)url+=`&status=${status}`;if(cat)url+=`&category=${cat}`;
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const items=await r.json();
  if(!items.length){document.getElementById('itemList').innerHTML='<div style="text-align:center;padding:60px;background:var(--white);border-radius:12px;color:var(--muted)">No items found</div>';return;}
  document.getElementById('itemList').innerHTML=items.map(i=>`
    <div class="lf-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:900;font-size:14px">${catEmoji[i.category]||'📦'} ${i.itemName}</div>
          ${i.description?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${i.description}</div>`:''}
          <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap">
            <span class="badge s-${i.status}">${i.status}</span>
            <span class="cat-chip">${i.category}</span>
            ${i.location?`<span class="cat-chip">📍 ${i.location}</span>`:''}
          </div>
        </div>
        <div style="text-align:right;font-size:11px;color:var(--muted)">
          <div>Found: ${new Date(i.foundAt).toLocaleDateString()}</div>
          ${i.foundBy?`<div>By: ${i.foundBy}</div>`:''}
        </div>
      </div>
      ${i.status==='CLAIMED'?`<div style="margin-top:8px;font-size:12px;background:#e7f5ed;border-radius:6px;padding:6px 10px">✅ Claimed by <strong>${i.claimedBy}</strong>${i.claimantPhone?' ('+i.claimantPhone+')':''}${i.claimedAt?' on '+new Date(i.claimedAt).toLocaleDateString():''}</div>`:''}
      ${i.status==='UNCLAIMED'?`<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-green" style="font-size:11px;padding:5px 10px" onclick="claimItem(${i.id})">✋ Mark Claimed</button>
        <button class="btn" style="font-size:11px;padding:5px 10px;background:#e8efff;color:var(--blue)" onclick="disposeItem(${i.id},'DONATED')">🤝 Donated</button>
        <button class="btn" style="font-size:11px;padding:5px 10px;background:#f0f0f0;color:#555" onclick="disposeItem(${i.id},'DISPOSED')">🗑️ Disposed</button>
        <button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="deleteItem(${i.id})">Del</button>
      </div>`:`<div style="margin-top:8px"><button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="deleteItem(${i.id})">Del</button></div>`}
    </div>`).join('');
}

async function logItem(){
  const itemName=document.getElementById('lfName').value.trim();
  if(!itemName){showToast('Item name required','error');return;}
  const body={itemName,category:document.getElementById('lfCat').value,description:document.getElementById('lfDesc').value,location:document.getElementById('lfLoc').value,foundBy:document.getElementById('lfBy').value,notes:document.getElementById('lfNotes').value};
  const r=await fetch('/api/lost-found',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Item logged!','success');document.getElementById('lfName').value='';document.getElementById('lfDesc').value='';document.getElementById('lfLoc').value='';document.getElementById('lfBy').value='';document.getElementById('lfNotes').value='';loadItems();}
  else showToast(d.message||'Error','error');
}

async function claimItem(id){
  const claimedBy=prompt('Claimant name:');if(!claimedBy)return;
  const claimantPhone=prompt('Claimant phone (optional):');
  const r=await fetch(`/api/lost-found/${id}/claim`,{method:'PATCH',headers:authH(),body:JSON.stringify({claimedBy,claimantPhone:claimantPhone||''})});
  const d=await r.json();
  if(d.id){showToast('Marked as claimed!','success');loadItems();}
}

async function disposeItem(id,status){
  const r=await fetch(`/api/lost-found/${id}`,{method:'PATCH',headers:authH(),body:JSON.stringify({status})});
  if((await r.json()).id){showToast('Updated!','success');loadItems();}
}

async function deleteItem(id){
  if(!confirm('Delete this record?'))return;
  await fetch(`/api/lost-found/${id}`,{method:'DELETE',headers:authH()});
  loadItems();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

loadItems();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
