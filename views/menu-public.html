<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#f97316"/><link rel="apple-touch-icon" href="/icons/icon-192.png"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Uena"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Order Online</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#ff6b2b;--bg:#f8f9fb;--white:#fff;--border:#e0e5f0;--muted:#888;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
header{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:20px;font-weight:900}
.cart-btn{background:var(--orange);color:#fff;border:none;padding:10px 20px;border-radius:25px;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:8px}
.cart-count{background:#fff;color:var(--orange);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}
.layout{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 72px)}
.sidebar{background:var(--white);border-right:1px solid var(--border);padding:16px 0;position:sticky;top:72px;height:calc(100vh - 72px);overflow-y:auto}
.cat-btn{display:block;width:100%;text-align:left;padding:10px 20px;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--muted)}
.cat-btn.active{color:var(--blue);background:#f0f4ff;font-weight:800;border-right:3px solid var(--blue)}
.main{padding:20px;overflow-y:auto}
.cat-section{margin-bottom:32px}
.cat-title{font-size:20px;font-weight:900;color:var(--navy);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.item-card{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:box-shadow .15s}
.item-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.item-img{width:100%;height:140px;object-fit:cover;background:#f0f2f5;display:flex;align-items:center;justify-content:center;font-size:40px}
.item-body{padding:12px}
.item-name{font-size:14px;font-weight:800;margin-bottom:4px}
.item-desc{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.4}
.item-footer{display:flex;align-items:center;justify-content:space-between}
.item-price{font-size:16px;font-weight:900;color:var(--navy)}
.add-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:800;cursor:pointer}
.add-btn:hover{background:var(--navy)}
.qty-control{display:flex;align-items:center;gap:8px}
.qty-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--blue);background:none;font-size:16px;font-weight:900;cursor:pointer;color:var(--blue);display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:var(--blue);color:#fff}
.qty-num{font-weight:900;font-size:14px;min-width:20px;text-align:center}
/* Cart drawer */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none}
.cart-overlay.open{display:block}
.cart-drawer{position:fixed;right:0;top:0;bottom:0;width:380px;max-width:95vw;background:var(--white);z-index:201;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.15);transform:translateX(100%);transition:transform .3s}
.cart-drawer.open{transform:translateX(0)}
.cart-header{background:var(--navy);color:#fff;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;font-weight:800;font-size:16px}
.cart-items{flex:1;overflow-y:auto;padding:16px}
.cart-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.cart-item-name{font-weight:700;font-size:14px;margin-bottom:2px}
.cart-item-price{font-size:12px;color:var(--muted)}
.cart-footer{padding:16px;border-top:2px solid var(--border);background:#f8f9fb}
.totals-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.totals-row.grand{font-size:18px;font-weight:900;padding-top:10px;border-top:2px solid var(--navy)}
.checkout-btn{width:100%;padding:14px;background:var(--orange);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:900;cursor:pointer;margin-top:12px}
/* Checkout modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:var(--white);border-radius:20px;padding:28px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:20px;font-weight:900;margin-bottom:20px;color:var(--navy)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:800;color:var(--navy);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:var(--font);outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--blue)}
.type-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.type-tab{padding:10px;border:2px solid var(--border);border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;text-align:center;background:none}
.type-tab.active{border-color:var(--blue);background:#f0f4ff;color:var(--blue)}
.place-btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:900;cursor:pointer;margin-top:8px}
.success-box{text-align:center;padding:20px}
@media(max-width:600px){.layout{grid-template-columns:1fr}.sidebar{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo">🍽️ Order Online</div>
  <button class="cart-btn" onclick="openCart()">🛒 Cart <span class="cart-count" id="cartCount">0</span></button>
</header>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="menuMain">
    <div style="text-align:center;padding:60px;color:var(--muted)">Loading menu...</div>
  </main>
</div>

<!-- Cart drawer -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    🛒 Your Cart
    <button onclick="closeCart()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:18px">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div style="text-align:center;padding:40px;color:var(--muted)">Cart is empty</div>
  </div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="totals-row"><span>Subtotal</span><span id="ctSubtotal">रू 0</span></div>
    <div class="totals-row"><span>Delivery Fee</span><span id="ctDelivery">रू 0</span></div>
    <div class="totals-row"><span>VAT (13%)</span><span id="ctTax">रू 0</span></div>
    <div class="totals-row grand"><span>Total</span><span id="ctTotal">रू 0</span></div>
    <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout →</button>
  </div>
</div>

<!-- Checkout modal -->
<div class="modal" id="checkoutModal">
  <div class="modal-box">
    <div id="checkoutContent">
      <div class="modal-title">📋 Complete Your Order</div>
      <div class="type-tabs">
        <div class="type-tab active" onclick="setOrderType('DELIVERY',this)">🛵 Delivery</div>
        <div class="type-tab" onclick="setOrderType('PICKUP',this)">🏃 Pickup</div>
      </div>
      <div class="form-group"><label>Your Name *</label><input id="cName" placeholder="Full name"/></div>
      <div class="form-group"><label>Phone *</label><input id="cPhone" placeholder="+977-98XXXXXXXX" type="tel"/></div>
      <div class="form-group"><label>Email</label><input id="cEmail" placeholder="email@example.com" type="email"/></div>
      <div class="form-group" id="addressGroup"><label>Delivery Address *</label><textarea id="cAddress" rows="2" style="resize:none" placeholder="Your full delivery address..."></textarea></div>
      <div class="form-group"><label>Payment Method</label>
        <select id="cPayment">
          <option value="CASH">💵 Cash on Delivery</option>
          <option value="ESEWA">📱 eSewa</option>
          <option value="KHALTI">💜 Khalti</option>
        </select>
      </div>
      <div class="form-group"><label>Notes (optional)</label><input id="cNotes" placeholder="Special requests..."/></div>
      <div style="background:#f8f9fb;border-radius:10px;padding:14px;margin-bottom:14px;font-size:13px">
        <div style="font-weight:800;margin-bottom:6px">Order Summary</div>
        <div id="modalSummary"></div>
      </div>
      <button class="place-btn" onclick="placeOrder()">🎉 Place Order</button>
      <button onclick="closeCheckout()" style="width:100%;padding:10px;background:none;border:none;color:var(--muted);cursor:pointer;margin-top:8px;font-size:13px">Cancel</button>
    </div>
  </div>
</div>

<script>
const table = new URLSearchParams(location.search).get('table');
let menu = {}, cart = [], orderType = 'DELIVERY';

async function loadMenu() {
  const r = await fetch('/api/online-orders/public/menu');
  const data = await r.json();
  menu = data.items || {};
  renderSidebar(data.categories || []);
  renderMenu(data.categories || []);
}

function renderSidebar(cats) {
  document.getElementById('sidebar').innerHTML = cats.map((c, i) =>
    `<button class="cat-btn${i===0?' active':''}" onclick="scrollTo('cat-${c}',this)">${c}</button>`
  ).join('');
}

function renderMenu(cats) {
  document.getElementById('menuMain').innerHTML = cats.map(cat => `
    <div class="cat-section" id="cat-${cat}">
      <div class="cat-title">${cat}</div>
      <div class="item-grid">
        ${(menu[cat]||[]).map(item => `
          <div class="item-card">
            <div class="item-img">${getCatEmoji(cat)}</div>
            <div class="item-body">
              <div class="item-name">${item.name}</div>
              <div class="item-desc">${item.description||''}</div>
              <div class="item-footer">
                <span class="item-price">रू ${(item.price||0).toLocaleString()}</span>
                <div id="ctrl-${item.id}">
                  <button class="add-btn" onclick="addItem(${JSON.stringify(item).replace(/"/g,'&quot;')})">+ Add</button>
                </div>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function getCatEmoji(cat) {
  const m = {Momo:'🥟',Pizza:'🍕',Burger:'🍔',Drinks:'🥤',Dessert:'🍰',Rice:'🍚',Noodles:'🍜',Soup:'🍲',Salad:'🥗',Snacks:'🍟'};
  return m[cat]||'🍽️';
}

function scrollTo(id, btn) {
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'});
}

function addItem(item) {
  const existing = cart.find(c => c.id === item.id);
  if (existing) { existing.qty++; }
  else { cart.push({ ...item, qty: 1 }); }
  updateCartUI();
  updateItemCtrl(item.id);
}

function removeItem(id) {
  const i = cart.findIndex(c => c.id === id);
  if (i === -1) return;
  cart[i].qty--;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  updateCartUI();
  updateItemCtrl(id);
}

function updateItemCtrl(id) {
  const c = cart.find(x => x.id === id);
  const el = document.getElementById('ctrl-'+id);
  if (!el) return;
  if (!c) {
    el.innerHTML = `<button class="add-btn" onclick='addItem(${JSON.stringify(cart).includes('"id":'+id) ? '' : '...'})'>+ Add</button>`;
    // re-fetch item from menu
    Object.values(menu).flat().forEach(item => {
      if (item.id === id) el.innerHTML = `<button class="add-btn" onclick='addItem(${JSON.stringify(item)})'>+ Add</button>`;
    });
  } else {
    el.innerHTML = `<div class="qty-control"><button class="qty-btn" onclick="removeItem(${id})">−</button><span class="qty-num">${c.qty}</span><button class="qty-btn" onclick="addItem(${JSON.stringify(Object.values(menu).flat().find(i=>i.id===id)||{id,name:'',price:0})})">+</button></div>`;
  }
}

function updateCartUI() {
  const count = cart.reduce((s, c) => s + c.qty, 0);
  document.getElementById('cartCount').textContent = count;
  if (!cart.length) {
    document.getElementById('cartItems').innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Cart is empty</div>';
    document.getElementById('cartFooter').style.display = 'none';
    return;
  }
  document.getElementById('cartFooter').style.display = 'block';
  document.getElementById('cartItems').innerHTML = cart.map(c => `
    <div class="cart-item">
      <div>
        <div class="cart-item-name">${c.name}</div>
        <div class="cart-item-price">रू ${c.price} × ${c.qty}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-weight:900">रू ${(c.price*c.qty).toLocaleString()}</span>
        <button onclick="removeItem(${c.id})" style="border:none;background:#fee;color:var(--red);border-radius:50%;width:24px;height:24px;cursor:pointer;font-weight:900">−</button>
      </div>
    </div>`).join('');
  const sub  = cart.reduce((s, c) => s + c.price * c.qty, 0);
  const del  = orderType === 'DELIVERY' ? 100 : 0;
  const tax  = Math.round(sub * 0.13);
  const tot  = sub + del + tax;
  document.getElementById('ctSubtotal').textContent = 'रू ' + sub.toLocaleString();
  document.getElementById('ctDelivery').textContent = 'रू ' + del;
  document.getElementById('ctTax').textContent = 'रू ' + tax;
  document.getElementById('ctTotal').textContent = 'रू ' + tot.toLocaleString();
}

function openCart()  { document.getElementById('cartDrawer').classList.add('open'); document.getElementById('cartOverlay').classList.add('open'); }
function closeCart() { document.getElementById('cartDrawer').classList.remove('open'); document.getElementById('cartOverlay').classList.remove('open'); }
function openCheckout() {
  if (!cart.length) return;
  closeCart();
  const sub = cart.reduce((s,c)=>s+c.price*c.qty,0);
  const del = orderType==='DELIVERY'?100:0;
  const tax = Math.round(sub*0.13);
  document.getElementById('modalSummary').innerHTML = cart.map(c=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0"><span>${c.qty}× ${c.name}</span><span>रू ${(c.price*c.qty).toLocaleString()}</span></div>`).join('')+`<div style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px;font-weight:900;display:flex;justify-content:space-between"><span>Total</span><span>रू ${(sub+del+tax).toLocaleString()}</span></div>`;
  document.getElementById('checkoutModal').classList.add('open');
}
function closeCheckout() { document.getElementById('checkoutModal').classList.remove('open'); }
function setOrderType(type, el) {
  orderType = type;
  document.querySelectorAll('.type-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('addressGroup').style.display = type==='DELIVERY'?'block':'none';
  updateCartUI();
}

async function placeOrder() {
  const name = document.getElementById('cName').value.trim();
  const phone = document.getElementById('cPhone').value.trim();
  const address = document.getElementById('cAddress').value.trim();
  if (!name || !phone) { alert('Name and phone are required'); return; }
  if (orderType==='DELIVERY' && !address) { alert('Delivery address is required'); return; }
  const body = {
    customerName: name, customerPhone: phone, customerEmail: document.getElementById('cEmail').value.trim(),
    orderType: table ? 'DINE_IN' : orderType, address, paymentMethod: document.getElementById('cPayment').value,
    notes: document.getElementById('cNotes').value.trim(),
    tableNumber: table ? +table : null,
    items: cart.map(c => ({ menuItemId: c.id, name: c.name, price: c.price, quantity: c.qty }))
  };
  const r = await fetch('/api/online-orders/public/order', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const d = await r.json();
  if (d.success) {
    document.getElementById('checkoutContent').innerHTML = `
      <div class="success-box">
        <div style="font-size:64px;margin-bottom:16px">🎉</div>
        <div style="font-size:22px;font-weight:900;color:var(--green);margin-bottom:8px">Order Placed!</div>
        <div style="font-size:14px;color:var(--muted);margin-bottom:16px">Order #${d.order.id} · Est. ${d.order.estimatedMins} min</div>
        <div style="font-size:13px;color:var(--navy);font-weight:700">We'll prepare your order shortly!</div>
        <button onclick="location.reload()" style="margin-top:20px;padding:12px 28px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer">Order More 🍽️</button>
      </div>`;
    cart = []; updateCartUI();
  } else {
    alert(d.message || 'Error placing order');
  }
}

if (table) {
  document.querySelector('header .logo').textContent = `🍽️ Table ${table} — Order`;
}
loadMenu();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
