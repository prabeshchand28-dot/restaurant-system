<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Allergen & Dietary Tags</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1200px;margin:0 auto}
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border)}
.tab{padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--muted)}
.tab.active{color:var(--navy);border-color:var(--navy)}
.panel{display:none}.panel.active{display:block}
.grid2{display:grid;grid-template-columns:300px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}
.tag-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:700;border:2px solid}
.tag-grid{display:flex;flex-wrap:wrap;gap:8px;padding:16px}
.menu-row{border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.menu-row:last-child{border-bottom:none}
.tag-toggle{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid;margin:2px}
.tag-toggle.on{opacity:1}.tag-toggle.off{opacity:.35}
.search-bar{padding:10px 16px;background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;display:flex;gap:8px}
.search-bar input{border:none;outline:none;font-size:14px;flex:1}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Allergen & Dietary Tags</span></span>
  <div><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('tags')">🏷️ Manage Tags</div>
    <div class="tab" onclick="switchTab('menu')">🍽️ Tag Menu Items</div>
  </div>

  <!-- TAGS PANEL -->
  <div class="panel active" id="panel-tags">
    <div class="grid2">
      <div>
        <div class="card">
          <div class="card-header">➕ Add New Tag</div>
          <div class="card-body">
            <label>Tag Name</label><input id="tName" placeholder="e.g. Gluten, Vegan, Halal"/>
            <label>Type</label>
            <select id="tType">
              <option value="ALLERGEN">⚠️ Allergen</option>
              <option value="DIETARY">🥗 Dietary</option>
            </select>
            <label>Icon (emoji)</label><input id="tIcon" placeholder="e.g. 🌾" maxlength="4"/>
            <label>Color (hex)</label><input id="tColor" type="color" value="#e74c3c" style="height:36px;padding:2px"/>
            <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="createTag()">Add Tag</button>
          </div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-header">⚠️ Allergens</div>
          <div class="tag-grid" id="allergenList">Loading...</div>
        </div>
        <div class="card">
          <div class="card-header">🥗 Dietary Labels</div>
          <div class="tag-grid" id="dietaryList">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MENU PANEL -->
  <div class="panel" id="panel-menu">
    <div class="search-bar">
      <input id="menuSearch" placeholder="Search menu items..." oninput="searchMenu()"/>
    </div>
    <div class="card">
      <div id="menuList">Loading...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});
let allTags=[];

async function loadTags(){
  const r=await fetch('/api/allergens',{headers:authH(),cache:'no-store'});
  allTags=await r.json();
  renderTags();
}

function renderTags(){
  const allergens=allTags.filter(t=>t.type==='ALLERGEN');
  const dietary=allTags.filter(t=>t.type==='DIETARY');
  document.getElementById('allergenList').innerHTML=renderTagList(allergens)||'<div style="color:var(--muted);font-size:12px;padding:4px">No allergen tags yet</div>';
  document.getElementById('dietaryList').innerHTML=renderTagList(dietary)||'<div style="color:var(--muted);font-size:12px;padding:4px">No dietary tags yet</div>';
}

function renderTagList(tags){
  return tags.map(t=>`
    <span class="tag-chip" style="background:${t.color}22;border-color:${t.color};color:${t.color}">
      ${t.icon||''} ${t.name}
      <span style="cursor:pointer;margin-left:4px;font-size:14px" onclick="deleteTag(${t.id},'${t.name}')">×</span>
    </span>`).join('');
}

async function createTag(){
  const name=document.getElementById('tName').value.trim();
  if(!name){showToast('Name required','error');return;}
  const body={name,type:document.getElementById('tType').value,icon:document.getElementById('tIcon').value,color:document.getElementById('tColor').value};
  const r=await fetch('/api/allergens',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Tag added!','success');document.getElementById('tName').value='';document.getElementById('tIcon').value='';loadTags();}
  else showToast(d.message||'Error','error');
}

async function deleteTag(id,name){
  if(!confirm(`Delete "${name}"?`))return;
  await fetch(`/api/allergens/${id}`,{method:'DELETE',headers:authH()});
  showToast('Deleted','success');loadTags();
}

// ── Menu tagging ─────────────────────────────────────
let menuItems=[];
let itemTagMap={};

async function loadMenuWithTags(search=''){
  const url='/api/allergens/menu'+(search?`?search=${encodeURIComponent(search)}`:'');
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  menuItems=await r.json();
  itemTagMap={};
  menuItems.forEach(m=>{itemTagMap[m.id]=m.tags.map(t=>t.id);});
  renderMenu();
}

function renderMenu(){
  if(!menuItems.length){document.getElementById('menuList').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No menu items</div>';return;}
  document.getElementById('menuList').innerHTML=menuItems.map(item=>{
    const assignedIds=itemTagMap[item.id]||[];
    const tagBtns=allTags.map(t=>{
      const on=assignedIds.includes(t.id);
      return `<span class="tag-toggle ${on?'on':'off'}" style="background:${t.color}22;border-color:${t.color};color:${t.color}" onclick="toggleTag(${item.id},${t.id})">${t.icon||''} ${t.name}</span>`;
    }).join('');
    return `<div class="menu-row">
      <div>
        <div style="font-weight:800;font-size:14px">${item.name}</div>
        <div style="font-size:12px;color:var(--muted)">${item.category} · रू ${item.price}</div>
      </div>
      <div style="flex:1;text-align:right">${tagBtns||'<span style="font-size:11px;color:var(--muted)">No tags available</span>'}</div>
    </div>`;
  }).join('');
}

async function toggleTag(menuItemId,tagId){
  const ids=itemTagMap[menuItemId]||[];
  const idx=ids.indexOf(tagId);
  if(idx>-1) ids.splice(idx,1); else ids.push(tagId);
  itemTagMap[menuItemId]=[...ids];
  renderMenu();
  await fetch(`/api/allergens/item/${menuItemId}`,{method:'PUT',headers:authH(),body:JSON.stringify({tagIds:ids})});
}

let searchT;
function searchMenu(){clearTimeout(searchT);searchT=setTimeout(()=>loadMenuWithTags(document.getElementById('menuSearch').value),300);}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['tags','menu'][i]===tab));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',['panel-tags','panel-menu'][i]==='panel-'+tab));
  if(tab==='menu')loadMenuWithTags();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

loadTags();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
