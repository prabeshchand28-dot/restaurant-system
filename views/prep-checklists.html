<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Prep Checklists</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1100px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .num{font-size:22px;font-weight:900}.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.grid{display:grid;grid-template-columns:320px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}
.cl-card{border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;background:var(--white)}
.cl-card.COMPLETED{border-left:4px solid var(--green)}.cl-card.IN_PROGRESS{border-left:4px solid var(--orange)}.cl-card.PENDING{border-left:4px solid var(--muted)}
.badge{display:inline-block;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:800}
.s-COMPLETED{background:#e7f5ed;color:var(--green)}.s-IN_PROGRESS{background:#fff3e0;color:var(--orange)}.s-PENDING{background:#f0f0f0;color:var(--muted)}
.t-OPENING{background:#e8efff;color:var(--blue)}.t-CLOSING{background:#f3e5f5;color:#6c3483}.t-CUSTOM{background:#f0f0f0;color:#555}
.check-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0}
.check-item:last-child{border-bottom:none}
.check-item input[type=checkbox]{width:auto;cursor:pointer;width:16px;height:16px}
.check-item label{font-size:13px;font-weight:500;margin:0;cursor:pointer;flex:1}
.check-item label.done{text-decoration:line-through;color:var(--muted)}
.item-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.progress-bar{height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s;background:linear-gradient(90deg,var(--green),#27ae60)}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Prep Checklists</span></span>
  <div><a class="nav-btn" href="/kitchen">🍳 Kitchen</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="stats">
    <div class="stat"><div class="num" id="s-today" style="color:var(--navy)">—</div><div class="lbl">Today's Lists</div></div>
    <div class="stat"><div class="num" id="s-done" style="color:var(--green)">—</div><div class="lbl">Completed Today</div></div>
    <div class="stat"><div class="num" id="s-pending" style="color:var(--orange)">—</div><div class="lbl">Pending</div></div>
    <div class="stat"><div class="num" id="s-total" style="color:var(--muted)">—</div><div class="lbl">All Time Total</div></div>
  </div>
  <div class="grid">
    <div>
      <div class="card">
        <div class="card-header">📋 Create Checklist</div>
        <div class="card-body">
          <label>Name *</label><input id="lName" placeholder="e.g. Morning Opening"/>
          <label>Type</label>
          <select id="lType">
            <option value="OPENING">🌅 Opening</option>
            <option value="CLOSING">🌙 Closing</option>
            <option value="CUSTOM">✏️ Custom</option>
          </select>
          <label>Shift</label>
          <select id="lShift">
            <option value="MORNING">☀️ Morning</option>
            <option value="AFTERNOON">🌤️ Afternoon</option>
            <option value="EVENING">🌙 Evening</option>
          </select>
          <label>Date</label><input type="date" id="lDate"/>
          <div style="margin:10px 0 6px;display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:12px;font-weight:700;color:var(--navy)">Checklist Items</span>
            <button class="btn" style="font-size:11px;padding:4px 9px" onclick="addItemRow()">+ Add Item</button>
          </div>
          <div id="itemRows"></div>
          <button class="btn btn-green" style="width:100%;margin-top:12px" onclick="createList()">📋 Create Checklist</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header">🔧 Quick Templates</div>
        <div class="card-body">
          <button class="btn" style="width:100%;margin-bottom:6px;background:#f0f2f5;color:var(--navy);border:1px solid var(--border)" onclick="loadTemplate('opening')">🌅 Load Opening Template</button>
          <button class="btn" style="width:100%;background:#f0f2f5;color:var(--navy);border:1px solid var(--border)" onclick="loadTemplate('closing')">🌙 Load Closing Template</button>
        </div>
      </div>
    </div>
    <div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <input type="date" id="fDate" onchange="loadLists()" style="width:150px"/>
        <select id="fType" onchange="loadLists()" style="width:130px">
          <option value="">All Types</option>
          <option value="OPENING">Opening</option>
          <option value="CLOSING">Closing</option>
          <option value="CUSTOM">Custom</option>
        </select>
        <select id="fStatus" onchange="loadLists()" style="width:130px">
          <option value="">All Status</option>
          <option value="PENDING">Pending</option>
          <option value="IN_PROGRESS">In Progress</option>
          <option value="COMPLETED">Completed</option>
        </select>
      </div>
      <div id="listOut">Loading...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});
const today=new Date().toISOString().slice(0,10);
document.getElementById('lDate').value=today;
document.getElementById('fDate').value=today;
let rowCount=0;

const TEMPLATES={
  opening:['Clean and sanitize all prep surfaces','Check refrigeration temperatures','Set up stations and mise en place','Portion sauces and condiments','Check inventory and flag shortages','Set up POS and cash drawer','Brief team on specials and 86 items','Check uniforms and hygiene'],
  closing:['Clear and sanitize all stations','Store leftover food properly (label + date)','Clean kitchen equipment (grills, fryers)','Sweep and mop kitchen floor','Empty and clean grease traps','Lock all storage areas','Cash-up and reconcile POS','Set alarm and lock premises']
};

function addItemRow(value=''){
  rowCount++;
  const id=rowCount;
  const div=document.createElement('div');
  div.className='item-row';div.id=`ir_${id}`;
  div.innerHTML=`<input placeholder="Checklist item..." value="${value}" style="flex:1;font-size:12px;padding:6px 8px"/>
    <button onclick="document.getElementById('ir_${id}').remove()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;padding:0 4px">×</button>`;
  document.getElementById('itemRows').appendChild(div);
}

function loadTemplate(type){
  document.getElementById('itemRows').innerHTML='';rowCount=0;
  document.getElementById('lType').value=type==='opening'?'OPENING':'CLOSING';
  document.getElementById('lName').value=type==='opening'?'Morning Opening Checklist':'Closing Checklist';
  TEMPLATES[type].forEach(t=>addItemRow(t));
}

function getItems(){
  const items=[];
  document.querySelectorAll('[id^="ir_"]').forEach(row=>{
    const val=row.querySelector('input').value.trim();
    if(val)items.push({label:val,done:false});
  });
  return items;
}

async function createList(){
  const name=document.getElementById('lName').value.trim();
  if(!name){showToast('Enter a name','error');return;}
  const items=getItems();
  if(!items.length){showToast('Add at least one item','error');return;}
  const body={name,checklistType:document.getElementById('lType').value,shift:document.getElementById('lShift').value,date:document.getElementById('lDate').value,items};
  const r=await fetch('/api/prep-checklists',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Created!','success');document.getElementById('lName').value='';document.getElementById('itemRows').innerHTML='';rowCount=0;loadStats();loadLists();}
  else showToast(d.message||'Error','error');
}

async function loadStats(){
  const r=await fetch('/api/prep-checklists/stats',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  document.getElementById('s-today').textContent=d.todayTotal;
  document.getElementById('s-done').textContent=d.todayDone;
  document.getElementById('s-pending').textContent=d.pending;
  document.getElementById('s-total').textContent=d.total;
}

async function loadLists(){
  const date=document.getElementById('fDate').value;
  const type=document.getElementById('fType').value;
  const status=document.getElementById('fStatus').value;
  let url='/api/prep-checklists?a=1';
  if(date)url+=`&date=${date}`;if(type)url+=`&type=${type}`;if(status)url+=`&status=${status}`;
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const lists=await r.json();
  if(!lists.length){document.getElementById('listOut').innerHTML='<div style="text-align:center;padding:60px;background:var(--white);border-radius:12px;color:var(--muted)">No checklists found</div>';return;}
  document.getElementById('listOut').innerHTML=lists.map(l=>{
    const done=l.items.filter(i=>i.done).length;
    const pct=l.items.length>0?Math.round(done/l.items.length*100):0;
    return `<div class="cl-card ${l.status}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="badge s-${l.status}">${l.status.replace('_',' ')}</span>
            <span class="badge t-${l.checklistType}">${l.checklistType}</span>
            <span style="font-size:11px;color:var(--muted)">${l.shift}</span>
          </div>
          <div style="font-size:15px;font-weight:900;margin-top:4px">${l.name}</div>
          <div style="font-size:12px;color:var(--muted)">${new Date(l.date).toLocaleDateString()} · ${done}/${l.items.length} items done</div>
        </div>
        <div style="font-size:24px;font-weight:900;color:${pct===100?'var(--green)':'var(--orange)'}">${pct}%</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="margin-top:10px">
        ${l.items.slice(0,5).map((item,idx)=>`<div class="check-item">
          <input type="checkbox" ${item.done?'checked':''} onchange="toggleItem(${l.id},${JSON.stringify(l.items)},${idx},this.checked)"/>
          <label class="${item.done?'done':''}" onclick="this.previousElementSibling.click()">${item.label}</label>
          ${item.done&&item.doneBy?`<span style="font-size:10px;color:var(--muted)">${item.doneBy}</span>`:''}
        </div>`).join('')}
        ${l.items.length>5?`<div style="font-size:12px;color:var(--muted);margin-top:4px">+${l.items.length-5} more items...</div>`:''}
      </div>
      <div style="margin-top:10px;display:flex;gap:6px">
        ${l.status!=='COMPLETED'?`<button class="btn btn-green" style="font-size:11px;padding:5px 10px" onclick="markComplete(${l.id})">✅ Mark Complete</button>`:''}
        <button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="delList(${l.id})">Del</button>
      </div>
    </div>`;
  }).join('');
}

async function toggleItem(listId, items, idx, checked){
  items[idx].done=checked;
  if(checked){const who=prompt('Your name:','');items[idx].doneBy=who||'';}
  const status=items.every(i=>i.done)?'COMPLETED':items.some(i=>i.done)?'IN_PROGRESS':'PENDING';
  await fetch(`/api/prep-checklists/${listId}`,{method:'PUT',headers:authH(),body:JSON.stringify({items,status})});
  loadStats();loadLists();
}

async function markComplete(id){
  const completedBy=prompt('Completed by:');
  if(completedBy===null)return;
  await fetch(`/api/prep-checklists/${id}`,{method:'PUT',headers:authH(),body:JSON.stringify({status:'COMPLETED',completedBy})});
  loadStats();loadLists();
}

async function delList(id){
  if(!confirm('Delete?'))return;
  await fetch(`/api/prep-checklists/${id}`,{method:'DELETE',headers:authH()});
  loadStats();loadLists();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}
addItemRow();addItemRow();addItemRow();
loadStats();loadLists();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
