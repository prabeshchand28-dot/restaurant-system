<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#f97316"/><link rel="apple-touch-icon" href="/icons/icon-192.png"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Uena"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Staff Commission Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--purple:#6c3483;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1100px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .num{font-size:20px;font-weight:900}.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.grid{display:grid;grid-template-columns:320px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}.btn-purple{background:var(--purple)}
.comm-card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
.comm-card.PENDING{border-left:4px solid var(--orange)}
.comm-card.APPROVED{border-left:4px solid var(--blue)}
.comm-card.PAID{border-left:4px solid var(--green);opacity:.7}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:800}
.s-PENDING{background:#fff3e0;color:var(--orange)}.s-APPROVED{background:#e8efff;color:var(--blue)}.s-PAID{background:#e7f5ed;color:var(--green)}
.tip{background:#f0f4ff;border:1px solid #c5d5f5;border-radius:8px;padding:12px;font-size:12px;color:var(--navy);margin-bottom:14px}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Staff Commissions</span></span>
  <div><a class="nav-btn" href="/payroll">💰 Payroll</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="stats">
    <div class="stat"><div class="num" id="s-pending" style="color:var(--orange)">—</div><div class="lbl">Pending</div></div>
    <div class="stat"><div class="num" id="s-approved" style="color:var(--blue)">—</div><div class="lbl">Approved</div></div>
    <div class="stat"><div class="num" id="s-paid" style="color:var(--green)">—</div><div class="lbl">Paid</div></div>
    <div class="stat"><div class="num" id="s-sales" style="color:var(--navy)">—</div><div class="lbl">Period Sales (रू)</div></div>
    <div class="stat"><div class="num" id="s-total" style="color:var(--purple)">—</div><div class="lbl">Commission Due (रू)</div></div>
  </div>
  <div class="grid">
    <div>
      <div class="card">
        <div class="card-header">📊 Log Commission</div>
        <div class="card-body">
          <div class="tip">💡 Log each staff member's sales for the period. Commission = Sales × Rate ÷ 100</div>
          <label>Staff Member</label>
          <select id="cStaff"><option value="">Select staff...</option></select>
          <label>Period</label>
          <input type="month" id="cPeriod"/>
          <label>Sales Amount (रू)</label>
          <input type="number" id="cSales" placeholder="e.g. 50000"/>
          <label>Commission Rate (%)</label>
          <input type="number" id="cRate" value="2" step="0.1" min="0" max="30" placeholder="e.g. 2.5"/>
          <div id="commPreview" style="margin-top:8px;font-size:12px;color:var(--muted)"></div>
          <label>Notes</label><input id="cNotes" placeholder="Optional notes..."/>
          <button class="btn btn-purple" style="width:100%;margin-top:14px" onclick="logCommission()">💾 Save Commission</button>
        </div>
      </div>
    </div>
    <div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
        <select id="fPeriod" onchange="loadCommissions()" style="width:150px">
          <option value="">All Periods</option>
        </select>
        <select id="fStatus" onchange="loadCommissions()" style="width:130px">
          <option value="">All Status</option>
          <option value="PENDING">Pending</option>
          <option value="APPROVED">Approved</option>
          <option value="PAID">Paid</option>
        </select>
        <select id="fStaff" onchange="loadCommissions()" style="width:160px"><option value="">All Staff</option></select>
      </div>
      <div id="commList">Loading...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});

// Set default period to current month
const now=new Date();
const defPeriod=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
document.getElementById('cPeriod').value=defPeriod;

async function init(){
  // Load staff
  const r=await fetch('/api/staff',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  const staff=d.data||d;
  [document.getElementById('cStaff'),document.getElementById('fStaff')].forEach((sel,idx)=>{
    sel.innerHTML=idx===0?'<option value="">Select staff...</option>':'<option value="">All Staff</option>';
    staff.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.dataset.name=s.name;o.textContent=s.name;sel.appendChild(o);});
  });
  // Load periods
  const pr=await fetch('/api/commissions/periods',{headers:authH(),cache:'no-store'});
  const periods=await pr.json();
  const fPer=document.getElementById('fPeriod');
  periods.forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;fPer.appendChild(o);});
  fPer.value=defPeriod;
  loadStats();loadCommissions();
}

async function loadStats(){
  const period=document.getElementById('fPeriod').value||defPeriod;
  const r=await fetch(`/api/commissions/stats?period=${period}`,{headers:authH(),cache:'no-store'});
  const d=await r.json();
  document.getElementById('s-pending').textContent=d.pending;
  document.getElementById('s-approved').textContent=d.approved;
  document.getElementById('s-paid').textContent=d.paid;
  document.getElementById('s-sales').textContent='रू '+Math.round(d.totalSales).toLocaleString();
  document.getElementById('s-total').textContent='रू '+Math.round(d.totalCommission).toLocaleString();
}

async function loadCommissions(){
  const period=document.getElementById('fPeriod').value;
  const status=document.getElementById('fStatus').value;
  const staffId=document.getElementById('fStaff').value;
  let url='/api/commissions?a=1';
  if(period)url+=`&period=${period}`;if(status)url+=`&status=${status}`;if(staffId)url+=`&staffId=${staffId}`;
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const list=await r.json();
  if(!list.length){document.getElementById('commList').innerHTML='<div style="text-align:center;padding:60px;background:var(--white);border-radius:12px;color:var(--muted)">No commission records for this period</div>';loadStats();return;}
  document.getElementById('commList').innerHTML=list.map(c=>`
    <div class="comm-card ${c.status}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:900;font-size:15px">👤 ${c.staffName}</div>
          <div style="font-size:12px;color:var(--muted)">Period: ${c.period}</div>
          <div style="margin-top:5px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            <span class="badge s-${c.status}">${c.status}</span>
            <span style="font-size:12px">Sales: <strong>रू ${Math.round(c.salesAmount).toLocaleString()}</strong></span>
            <span style="font-size:12px">Rate: <strong>${c.commissionRate}%</strong></span>
          </div>
          ${c.paidAt?`<div style="font-size:11px;color:var(--green);margin-top:4px">💰 Paid by ${c.paidBy} on ${new Date(c.paidAt).toLocaleDateString()}</div>`:''}
          ${c.notes?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${c.notes}</div>`:''}
        </div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:900;color:var(--purple)">रू ${Math.round(c.commissionAmount).toLocaleString()}</div>
          <div style="font-size:11px;color:var(--muted)">commission</div>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
        ${c.status==='PENDING'?`<button class="btn" style="font-size:11px;padding:5px 10px;background:#e8efff;color:var(--blue)" onclick="approve(${c.id})">✅ Approve</button>`:''}
        ${c.status==='APPROVED'?`<button class="btn btn-green" style="font-size:11px;padding:5px 10px" onclick="markPaid(${c.id})">💰 Mark Paid</button>`:''}
        <button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="deleteComm(${c.id})">Del</button>
      </div>
    </div>`).join('');
  loadStats();
}

async function logCommission(){
  const staffSel=document.getElementById('cStaff');
  const staffId=staffSel.value;
  if(!staffId){showToast('Select staff','error');return;}
  const staffName=staffSel.options[staffSel.selectedIndex].dataset.name||'';
  const sales=document.getElementById('cSales').value;
  const rate=document.getElementById('cRate').value;
  if(!sales||!rate){showToast('Sales and rate required','error');return;}
  const body={staffId,staffName,period:document.getElementById('cPeriod').value,salesAmount:parseFloat(sales),commissionRate:parseFloat(rate),notes:document.getElementById('cNotes').value};
  const r=await fetch('/api/commissions',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Commission saved!','success');document.getElementById('cSales').value='';document.getElementById('cNotes').value='';document.getElementById('commPreview').textContent='';loadCommissions();}
  else showToast(d.message||'Error','error');
}

async function approve(id){
  const r=await fetch(`/api/commissions/${id}/approve`,{method:'PATCH',headers:authH()});
  if((await r.json()).id){showToast('Approved!','success');loadCommissions();}
}

async function markPaid(id){
  const paidBy=prompt('Paid by (manager name):');
  if(!paidBy)return;
  const r=await fetch(`/api/commissions/${id}/paid`,{method:'PATCH',headers:authH(),body:JSON.stringify({paidBy})});
  if((await r.json()).id){showToast('Marked as paid!','success');loadCommissions();}
}

async function deleteComm(id){
  if(!confirm('Delete this commission record?'))return;
  await fetch(`/api/commissions/${id}`,{method:'DELETE',headers:authH()});
  loadCommissions();
}

// Live commission preview
['cSales','cRate'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{
  const s=parseFloat(document.getElementById('cSales').value)||0;
  const r=parseFloat(document.getElementById('cRate').value)||0;
  const c=Math.round(s*r/100);
  document.getElementById('commPreview').innerHTML=c>0?`<span style="color:var(--purple);font-weight:700">Commission: रू ${c.toLocaleString()}</span>`:'';
}));

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

init();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
