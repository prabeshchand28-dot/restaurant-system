<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#f97316"/><link rel="apple-touch-icon" href="/icons/icon-192.png"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Uena"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Menu Category Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1000px;margin:0 auto}
.grid{display:grid;grid-template-columns:320px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}
.cat-item{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:grab;background:var(--white);transition:box-shadow .15s}
.cat-item:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.cat-item.dragging{opacity:.5;box-shadow:0 8px 20px rgba(0,0,0,.15)}
.cat-item.drag-over{border-color:var(--blue);background:#e8efff}
.color-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0}
.drag-handle{color:#aaa;font-size:18px;cursor:grab;flex-shrink:0;padding:0 4px}
.icon-preview{font-size:22px;flex-shrink:0}
.inactive-badge{background:#f0f0f0;color:var(--muted);font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px}
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.color-swatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.color-swatch:hover,.color-swatch.sel{transform:scale(1.15);border-color:#333}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Menu Category Manager</span></span>
  <div><a class="nav-btn" href="/menu">🍴 Menu</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="grid">
    <div>
      <div class="card">
        <div class="card-header">➕ New Category</div>
        <div class="card-body">
          <label>Category Name *</label><input id="cName" placeholder="e.g. Appetizers"/>
          <label>Icon (emoji)</label><input id="cIcon" placeholder="🍽️" maxlength="4"/>
          <label>Color</label>
          <div class="color-row" id="colorSwatches"></div>
          <input type="color" id="cColor" value="#2653a0" style="margin-top:6px;height:36px;padding:2px 4px;cursor:pointer"/>
          <label>Description</label><input id="cDesc" placeholder="Optional subtitle..."/>
          <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="createCat()">➕ Create Category</button>
        </div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="card-header">
          <span>📋 Categories (drag to reorder)</span>
          <button onclick="saveOrder()" class="btn btn-green" style="font-size:11px;padding:5px 12px">💾 Save Order</button>
        </div>
        <div class="card-body" id="catList">Loading...</div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});
let categories=[];
const swatchColors=['#2653a0','#1a7a3a','#c0392b','#e65100','#b7860a','#8e24aa','#00838f','#37474f','#1a3a6b','#2e7d32'];

// Build color swatches
const swatchContainer=document.getElementById('colorSwatches');
swatchColors.forEach(c=>{
  const d=document.createElement('div');
  d.className='color-swatch';d.style.background=c;d.title=c;
  d.onclick=()=>{document.getElementById('cColor').value=c;document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('sel'));d.classList.add('sel');};
  swatchContainer.appendChild(d);
});
swatchContainer.firstChild.classList.add('sel');

async function loadCats(){
  const r=await fetch('/api/menu-categories',{headers:authH(),cache:'no-store'});
  categories=await r.json();
  renderList();
}

function renderList(){
  if(!categories.length){document.getElementById('catList').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No categories yet — create one!</div>';return;}
  document.getElementById('catList').innerHTML=categories.map((c,i)=>`
    <div class="cat-item" draggable="true" data-id="${c.id}" data-idx="${i}" ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})" ondrop="drop(event,${i})" ondragleave="dragLeave(event)" ondragend="dragEnd(event)">
      <span class="drag-handle">⠿</span>
      <span class="icon-preview">${c.icon}</span>
      <div class="color-dot" style="background:${c.color}"></div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px">${c.name} ${!c.active?'<span class="inactive-badge">HIDDEN</span>':''}</div>
        <div style="font-size:11px;color:var(--muted)">#${c.displayOrder} ${c.description?'· '+c.description:''}</div>
      </div>
      <div style="display:flex;gap:4px">
        <button onclick="toggleActive(${c.id},${c.active})" style="padding:4px 8px;border:1px solid var(--border);border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;background:var(--white)">${c.active?'Hide':'Show'}</button>
        <button onclick="delCat(${c.id})" style="padding:4px 8px;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;background:var(--red);color:#fff">Del</button>
      </div>
    </div>`).join('');
}

let dragSrc=null;
function dragStart(e,idx){dragSrc=idx;e.currentTarget.classList.add('dragging');}
function dragOver(e,idx){e.preventDefault();document.querySelectorAll('.cat-item').forEach((el,i)=>el.classList.toggle('drag-over',i===idx&&idx!==dragSrc));}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function drop(e,idx){
  e.preventDefault();
  if(dragSrc===null||dragSrc===idx)return;
  const moved=categories.splice(dragSrc,1)[0];
  categories.splice(idx,0,moved);
  dragSrc=null;
  renderList();
  showToast('Reordered — click Save Order to persist','info');
}
function dragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.cat-item').forEach(el=>el.classList.remove('drag-over'));}

async function saveOrder(){
  const order=categories.map((c,i)=>({id:c.id,displayOrder:i}));
  const r=await fetch('/api/menu-categories/reorder',{method:'POST',headers:authH(),body:JSON.stringify({order})});
  if((await r.json()).message==='Reordered'){showToast('Order saved!','success');loadCats();}
  else showToast('Error saving','error');
}

async function createCat(){
  const name=document.getElementById('cName').value.trim();
  if(!name){showToast('Enter category name','error');return;}
  const body={name,icon:document.getElementById('cIcon').value||'🍽️',color:document.getElementById('cColor').value,description:document.getElementById('cDesc').value,displayOrder:categories.length};
  const r=await fetch('/api/menu-categories',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Created!','success');document.getElementById('cName').value='';document.getElementById('cIcon').value='';document.getElementById('cDesc').value='';loadCats();}
  else showToast(d.message||'Error','error');
}

async function toggleActive(id,active){
  await fetch(`/api/menu-categories/${id}`,{method:'PUT',headers:authH(),body:JSON.stringify({active:!active})});
  loadCats();
}

async function delCat(id){
  if(!confirm('Delete category?'))return;
  await fetch(`/api/menu-categories/${id}`,{method:'DELETE',headers:authH()});
  loadCats();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}
loadCats();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
