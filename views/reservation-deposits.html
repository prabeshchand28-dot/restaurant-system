<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reservation Deposits</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1100px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .num{font-size:18px;font-weight:900}.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.grid{display:grid;grid-template-columns:320px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}.btn-orange{background:var(--orange)}
.dep-card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}
.dep-card.RECEIVED{border-left:4px solid var(--blue)}
.dep-card.APPLIED{border-left:4px solid var(--green)}
.dep-card.REFUNDED{border-left:4px solid var(--orange)}
.dep-card.FORFEITED{border-left:4px solid var(--red)}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:800}
.s-RECEIVED{background:#e8efff;color:var(--blue)}.s-APPLIED{background:#e7f5ed;color:var(--green)}.s-REFUNDED{background:#fff3e0;color:var(--orange)}.s-FORFEITED{background:#fce8e7;color:var(--red)}
.pm-chip{font-size:10px;background:#f0f0f0;border-radius:20px;padding:2px 7px;font-weight:700}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Reservation Deposits</span></span>
  <div><a class="nav-btn" href="/reservations">📅 Reservations</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="stats">
    <div class="stat"><div class="num" id="s-held" style="color:var(--blue)">—</div><div class="lbl">💰 Held (रू)</div></div>
    <div class="stat"><div class="num" id="s-received" style="color:var(--blue)">—</div><div class="lbl">Received</div></div>
    <div class="stat"><div class="num" id="s-applied" style="color:var(--green)">—</div><div class="lbl">Applied</div></div>
    <div class="stat"><div class="num" id="s-refunded" style="color:var(--orange)">—</div><div class="lbl">Refunded</div></div>
    <div class="stat"><div class="num" id="s-forfeited" style="color:var(--red)">—</div><div class="lbl">Forfeited</div></div>
  </div>
  <div class="grid">
    <div>
      <div class="card">
        <div class="card-header">➕ Record Deposit</div>
        <div class="card-body">
          <label>Customer Name</label><input id="dName" placeholder="Full name"/>
          <label>Phone</label><input id="dPhone" placeholder="98XXXXXXXX" type="tel"/>
          <label>Party Size</label><input type="number" id="dParty" value="4" min="1" max="50"/>
          <label>Reservation Date</label><input type="date" id="dDate"/>
          <label>Deposit Amount (रू)</label><input type="number" id="dAmount" placeholder="e.g. 1000" min="0"/>
          <label>Payment Method</label>
          <select id="dMethod">
            <option value="CASH">💵 Cash</option>
            <option value="CARD">💳 Card</option>
            <option value="TRANSFER">🏦 Bank Transfer</option>
            <option value="WALLET">📱 Wallet/QR</option>
          </select>
          <label>Received By</label><input id="dBy" placeholder="Staff name"/>
          <label>Notes</label><input id="dNotes" placeholder="Any notes..."/>
          <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="recordDeposit()">💰 Record Deposit</button>
        </div>
      </div>
    </div>
    <div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <select id="fStatus" onchange="loadDeposits()" style="width:140px">
          <option value="">All Status</option>
          <option value="RECEIVED">Received</option>
          <option value="APPLIED">Applied</option>
          <option value="REFUNDED">Refunded</option>
          <option value="FORFEITED">Forfeited</option>
        </select>
        <input type="date" id="fFrom" onchange="loadDeposits()" style="width:140px"/>
        <input type="date" id="fTo" onchange="loadDeposits()" style="width:140px"/>
      </div>
      <div id="depList">Loading...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});

async function loadStats(){
  const r=await fetch('/api/deposits/stats',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  document.getElementById('s-held').textContent='रू '+Math.round(d.heldAmount).toLocaleString();
  document.getElementById('s-received').textContent=d.received;
  document.getElementById('s-applied').textContent=d.applied;
  document.getElementById('s-refunded').textContent=d.refunded;
  document.getElementById('s-forfeited').textContent=d.forfeited;
}

async function loadDeposits(){
  const status=document.getElementById('fStatus').value;
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  let url='/api/deposits?a=1';
  if(status)url+=`&status=${status}`;if(from)url+=`&from=${from}`;if(to)url+=`&to=${to}`;
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const deps=await r.json();
  if(!deps.length){document.getElementById('depList').innerHTML='<div style="text-align:center;padding:60px;background:var(--white);border-radius:12px;color:var(--muted)">No deposits found</div>';return;}
  const pmIcon={CASH:'💵',CARD:'💳',TRANSFER:'🏦',WALLET:'📱'};
  document.getElementById('depList').innerHTML=deps.map(d=>`
    <div class="dep-card ${d.status}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:900;font-size:14px">👤 ${d.customerName}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">
            Party of ${d.partySize}${d.phone?' · 📞 '+d.phone:''}
            ${d.reservationDate?' · 📅 '+new Date(d.reservationDate).toLocaleDateString():''}
          </div>
          <div style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap;align-items:center">
            <span class="badge s-${d.status}">${d.status}</span>
            <span class="pm-chip">${pmIcon[d.paymentMethod]||''} ${d.paymentMethod}</span>
            ${d.receivedBy?`<span style="font-size:11px;color:var(--muted)">By: ${d.receivedBy}</span>`:''}
          </div>
          ${d.refundReason?`<div style="font-size:12px;color:var(--orange);margin-top:4px">Reason: ${d.refundReason}</div>`:''}
          ${d.notes?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${d.notes}</div>`:''}
          <div style="font-size:11px;color:var(--muted);margin-top:4px">${new Date(d.createdAt).toLocaleString()}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:900;color:var(--green)">रू ${d.amount.toLocaleString()}</div>
        </div>
      </div>
      ${d.status==='RECEIVED'?`<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-green" style="font-size:11px;padding:5px 10px" onclick="setStatus(${d.id},'APPLIED')">✅ Applied to Bill</button>
        <button class="btn btn-orange" style="font-size:11px;padding:5px 10px" onclick="refund(${d.id})">↩️ Refund</button>
        <button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="setStatus(${d.id},'FORFEITED')">🚫 Forfeit</button>
      </div>`:`<div style="margin-top:8px"><button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="delDep(${d.id})">Del</button></div>`}
    </div>`).join('');
}

async function recordDeposit(){
  const name=document.getElementById('dName').value.trim();
  const amount=document.getElementById('dAmount').value;
  if(!name||!amount){showToast('Name and amount required','error');return;}
  const body={customerName:name,phone:document.getElementById('dPhone').value,partySize:document.getElementById('dParty').value,reservationDate:document.getElementById('dDate').value||null,amount:parseFloat(amount),paymentMethod:document.getElementById('dMethod').value,receivedBy:document.getElementById('dBy').value,notes:document.getElementById('dNotes').value};
  const r=await fetch('/api/deposits',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Deposit recorded!','success');document.getElementById('dName').value='';document.getElementById('dPhone').value='';document.getElementById('dAmount').value='';document.getElementById('dNotes').value='';loadStats();loadDeposits();}
  else showToast(d.message||'Error','error');
}

async function setStatus(id,status){
  await fetch(`/api/deposits/${id}`,{method:'PATCH',headers:authH(),body:JSON.stringify({status})});
  showToast('Updated!','success');loadStats();loadDeposits();
}

async function refund(id){
  const reason=prompt('Refund reason:');
  if(!reason)return;
  await fetch(`/api/deposits/${id}`,{method:'PATCH',headers:authH(),body:JSON.stringify({status:'REFUNDED',refundReason:reason})});
  showToast('Refund recorded','success');loadStats();loadDeposits();
}

async function delDep(id){
  if(!confirm('Delete?'))return;
  await fetch(`/api/deposits/${id}`,{method:'DELETE',headers:authH()});
  loadStats();loadDeposits();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

loadStats();loadDeposits();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
