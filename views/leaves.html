<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#f97316"/><link rel="apple-touch-icon" href="/icons/icon-192.png"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Uena"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Leave Management</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1100px;margin:0 auto}
.grid{display:grid;grid-template-columns:360px 1fr;gap:20px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-card .num{font-size:24px;font-weight:900;color:var(--blue)}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-primary{background:var(--blue);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px;font-weight:700;border:none;border-radius:4px;cursor:pointer;font-family:var(--font)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.leave-item{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:800;text-transform:uppercase}
.badge-orange{background:#fff3e0;color:var(--orange)}
.badge-green{background:#e7f5ed;color:var(--green)}
.badge-red{background:#fce8e7;color:var(--red)}
.badge-blue{background:#e8efff;color:var(--blue)}
.leave-type-sick{border-left:4px solid var(--red)}
.leave-type-annual{border-left:4px solid var(--blue)}
.leave-type-casual{border-left:4px solid var(--orange)}
.leave-type-maternity{border-left:4px solid #e91e63}
.leave-type-unpaid{border-left:4px solid #999}
.filter-bar{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Leave Management</span></span>
  <div><a class="nav-btn" href="/shifts">⏱️ Shifts</a><a class="nav-btn" href="/staff">👥 Staff</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="stats" id="leaveStats">
    <div class="stat-card"><div class="num" id="s-pending">—</div><div class="lbl">Pending</div></div>
    <div class="stat-card"><div class="num" id="s-approved">—</div><div class="lbl">Approved</div></div>
    <div class="stat-card"><div class="num" id="s-rejected">—</div><div class="lbl">Rejected</div></div>
    <div class="stat-card"><div class="num" id="s-total">—</div><div class="lbl">Total</div></div>
  </div>

  <div class="grid">
    <!-- Request form -->
    <div>
      <div class="card">
        <div class="card-header">📋 New Leave Request</div>
        <div class="card-body">
          <label>Staff Member</label>
          <select id="lStaff"><option value="">Select staff...</option></select>
          <label>Leave Type</label>
          <select id="lType">
            <option value="ANNUAL">Annual Leave</option>
            <option value="SICK">Sick Leave</option>
            <option value="CASUAL">Casual Leave</option>
            <option value="MATERNITY">Maternity / Paternity</option>
            <option value="UNPAID">Unpaid Leave</option>
          </select>
          <label>Start Date</label>
          <input type="date" id="lStart"/>
          <label>End Date</label>
          <input type="date" id="lEnd"/>
          <label>Reason</label>
          <textarea id="lReason" rows="3" placeholder="Reason for leave..."></textarea>
          <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="submitLeave()">Submit Request</button>
        </div>
      </div>
    </div>

    <!-- Leave list -->
    <div>
      <div class="filter-bar">
        <select id="filterStatus" style="width:auto" onchange="loadLeaves()">
          <option value="">All Status</option>
          <option value="PENDING">Pending</option>
          <option value="APPROVED">Approved</option>
          <option value="REJECTED">Rejected</option>
        </select>
        <select id="filterType" style="width:auto" onchange="loadLeaves()">
          <option value="">All Types</option>
          <option value="ANNUAL">Annual</option>
          <option value="SICK">Sick</option>
          <option value="CASUAL">Casual</option>
          <option value="MATERNITY">Maternity</option>
          <option value="UNPAID">Unpaid</option>
        </select>
      </div>

      <div class="card">
        <div class="card-header">
          📅 Leave Requests
          <span id="leaveCount" style="font-size:11px;font-weight:500;opacity:.8"></span>
        </div>
        <div class="card-body" id="leaveList">
          <div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});

async function loadStaff(){
  const r=await fetch('/api/staff',{headers:authH(),cache:'no-store'});
  const data=await r.json();
  const staff=data.data||data;
  const s=document.getElementById('lStaff');
  s.innerHTML='<option value="">Select staff...</option>';
  staff.forEach(st=>{const o=document.createElement('option');o.value=st.id;o.textContent=st.name;s.appendChild(o);});
}

async function loadLeaves(){
  const status=document.getElementById('filterStatus').value;
  const type=document.getElementById('filterType').value;
  let url='/api/leaves?';
  if(status) url+=`status=${status}&`;
  if(type) url+=`type=${type}`;
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const data=await r.json();
  const leaves=data.leaves||data;

  document.getElementById('s-pending').textContent=leaves.filter(l=>l.status==='PENDING').length;
  document.getElementById('s-approved').textContent=leaves.filter(l=>l.status==='APPROVED').length;
  document.getElementById('s-rejected').textContent=leaves.filter(l=>l.status==='REJECTED').length;
  document.getElementById('s-total').textContent=leaves.length;
  document.getElementById('leaveCount').textContent=`(${leaves.length} records)`;

  if(!leaves.length){
    document.getElementById('leaveList').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No leave requests</div>';
    return;
  }

  const typeClass={SICK:'leave-type-sick',ANNUAL:'leave-type-annual',CASUAL:'leave-type-casual',MATERNITY:'leave-type-maternity',UNPAID:'leave-type-unpaid'};
  const statusBadge={PENDING:'badge-orange',APPROVED:'badge-green',REJECTED:'badge-red'};

  document.getElementById('leaveList').innerHTML=leaves.map(l=>{
    const days=Math.ceil((new Date(l.endDate)-new Date(l.startDate))/(1000*60*60*24))+1;
    return `<div class="leave-item ${typeClass[l.type]||''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:800;font-size:14px;margin-bottom:4px">${l.staff?.name||'Staff'}</div>
          <div style="margin-bottom:6px">
            <span class="badge badge-blue">${l.type}</span>
            <span class="badge ${statusBadge[l.status]||'badge-blue'}" style="margin-left:4px">${l.status}</span>
          </div>
          <div style="font-size:12px;color:var(--muted)">${l.startDate?.slice(0,10)} → ${l.endDate?.slice(0,10)} (${days} day${days>1?'s':''})</div>
          ${l.reason?`<div style="font-size:12px;color:#555;margin-top:4px">"${l.reason}"</div>`:''}
        </div>
        ${l.status==='PENDING'?`
          <div style="display:flex;flex-direction:column;gap:6px">
            <button class="btn-sm btn-green" onclick="approveLeave(${l.id})">✓ Approve</button>
            <button class="btn-sm btn-red" onclick="rejectLeave(${l.id})">✗ Reject</button>
          </div>`:''}
      </div>
    </div>`;
  }).join('');
}

async function submitLeave(){
  const body={
    staffId:Number(document.getElementById('lStaff').value),
    type:document.getElementById('lType').value,
    startDate:document.getElementById('lStart').value,
    endDate:document.getElementById('lEnd').value,
    reason:document.getElementById('lReason').value.trim(),
  };
  if(!body.staffId||!body.startDate||!body.endDate){showToast('Fill all required fields','error');return;}
  const r=await fetch('/api/leaves',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Leave request submitted!','success');loadLeaves();}
  else showToast(d.message||'Error','error');
}

async function approveLeave(id){
  await fetch(`/api/leaves/${id}/approve`,{method:'PATCH',headers:authH()});
  showToast('Approved!','success');loadLeaves();
}
async function rejectLeave(id){
  await fetch(`/api/leaves/${id}/reject`,{method:'PATCH',headers:authH()});
  showToast('Rejected','error');loadLeaves();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

loadStaff();loadLeaves();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
