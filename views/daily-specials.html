<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#f97316"/><link rel="apple-touch-icon" href="/icons/icon-192.png"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Uena"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Daily Specials</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--gold:#b8860b;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1100px;margin:0 auto}
.grid{display:grid;grid-template-columns:320px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:16px}
label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}
.special-card{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px}
.special-top{background:linear-gradient(135deg,var(--gold),#e6a800);color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.special-name{font-size:16px;font-weight:900}
.special-price-area{text-align:right}
.special-price{font-size:22px;font-weight:900}
.original-price{font-size:11px;text-decoration:line-through;opacity:.7}
.saving{font-size:10px;background:rgba(255,255,255,.25);border-radius:20px;padding:2px 7px;font-weight:700}
.special-body{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.meal-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:100px;background:#e8efff;color:var(--blue)}
.avail{font-size:12px;color:var(--muted);font-weight:600}
.inactive{opacity:.5}
.today-section{background:#fff8e6;border:1px solid #ffe080;border-radius:12px;padding:16px;margin-bottom:20px}
.today-section h2{font-size:14px;font-weight:800;color:#856404;margin-bottom:12px}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Daily Specials</span></span>
  <div><a class="nav-btn" href="/specials-board" target="_blank">📋 Public Board</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <!-- Today's specials banner -->
  <div class="today-section">
    <h2>⭐ Today's Active Specials</h2>
    <div id="todayList" style="display:flex;gap:10px;flex-wrap:wrap">Loading...</div>
  </div>

  <div class="grid">
    <!-- Create -->
    <div>
      <div class="card">
        <div class="card-header">➕ Add Daily Special</div>
        <div class="card-body">
          <label>Item Name</label><input id="sName" placeholder="e.g. Dal Bhat Set"/>
          <label>Description</label><input id="sDesc" placeholder="e.g. With salad and pickle"/>
          <label>Date</label><input type="date" id="sDate"/>
          <label>Meal Type</label>
          <select id="sMeal">
            <option value="ALL">🍽️ All Day</option>
            <option value="BREAKFAST">🌅 Breakfast</option>
            <option value="LUNCH">☀️ Lunch</option>
            <option value="DINNER">🌆 Dinner</option>
          </select>
          <div style="display:flex;gap:8px">
            <div style="flex:1"><label>Original Price (रू)</label><input type="number" id="sOriginal" placeholder="0"/></div>
            <div style="flex:1"><label>Special Price (रू)</label><input type="number" id="sSpecial" placeholder="0"/></div>
          </div>
          <label>Available Qty (leave blank = unlimited)</label><input type="number" id="sQty" placeholder="e.g. 20"/>
          <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="createSpecial()">Add Special</button>
        </div>
      </div>
    </div>

    <!-- List -->
    <div>
      <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
        <input type="date" id="fDate" onchange="loadSpecials()" style="width:150px"/>
        <select id="fMeal" onchange="loadSpecials()" style="width:130px">
          <option value="">All Meals</option>
          <option value="BREAKFAST">Breakfast</option>
          <option value="LUNCH">Lunch</option>
          <option value="DINNER">Dinner</option>
          <option value="ALL">All Day</option>
        </select>
        <button class="btn" style="font-size:12px;padding:6px 12px" onclick="loadSpecials()">↻</button>
      </div>
      <div id="specialsList">Loading...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});
const mealEmoji={ALL:'🍽️',BREAKFAST:'🌅',LUNCH:'☀️',DINNER:'🌆'};

async function loadToday(){
  const r=await fetch('/api/specials/today',{cache:'no-store'});
  const data=await r.json();
  if(!data.length){document.getElementById('todayList').innerHTML='<div style="font-size:13px;color:#856404">No specials today. Add some below!</div>';return;}
  document.getElementById('todayList').innerHTML=data.map(s=>`
    <div style="background:#fff;border:1px solid #ffe080;border-radius:10px;padding:10px 14px;min-width:160px">
      <div style="font-weight:800;font-size:13px">${s.itemName}</div>
      <div style="font-size:11px;color:var(--muted)">${mealEmoji[s.mealType]} ${s.mealType}</div>
      <div style="font-size:18px;font-weight:900;color:var(--green);margin-top:2px">रू ${s.specialPrice}</div>
      ${s.originalPrice?`<div style="font-size:10px;text-decoration:line-through;color:var(--muted)">रू ${s.originalPrice}</div>`:''}
      ${s.availableQty!=null?`<div style="font-size:10px;color:var(--orange);font-weight:700">${s.availableQty-s.soldQty} left</div>`:''}
    </div>`).join('');
}

async function loadSpecials(){
  const date=document.getElementById('fDate').value;
  const meal=document.getElementById('fMeal').value;
  let url='/api/specials?a=1';
  if(date)url+=`&date=${date}`;if(meal)url+=`&mealType=${meal}`;
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const specials=await r.json();
  if(!specials.length){document.getElementById('specialsList').innerHTML='<div style="text-align:center;padding:60px;background:var(--white);border-radius:12px;color:var(--muted)">No specials found</div>';return;}
  document.getElementById('specialsList').innerHTML=specials.map(s=>{
    const saving=s.originalPrice?Math.round((1-s.specialPrice/s.originalPrice)*100):0;
    return `<div class="special-card ${!s.active?'inactive':''}">
      <div class="special-top">
        <div>
          <div class="special-name">${s.itemName}</div>
          ${s.description?`<div style="font-size:12px;opacity:.8;margin-top:2px">${s.description}</div>`:''}
          <div style="margin-top:6px">${saving>0?`<span class="saving">💰 Save ${saving}%</span>`:''}</div>
        </div>
        <div class="special-price-area">
          <div class="special-price">रू ${s.specialPrice}</div>
          ${s.originalPrice?`<div class="original-price">रू ${s.originalPrice}</div>`:''}
        </div>
      </div>
      <div class="special-body">
        <div style="display:flex;gap:6px;align-items:center">
          <span class="meal-badge">${mealEmoji[s.mealType]} ${s.mealType}</span>
          <span style="font-size:11px;color:var(--muted)">${new Date(s.date).toLocaleDateString()}</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${s.availableQty!=null?`<span class="avail">${s.availableQty-s.soldQty}/${s.availableQty} left</span>`:'<span class="avail">Unlimited</span>'}
          <button class="btn" style="font-size:10px;padding:3px 8px;background:${s.active?'#f0f0f0':'var(--green)'};color:${s.active?'#555':'#fff'}" onclick="toggleSpecial(${s.id},${!s.active})">${s.active?'Deactivate':'Activate'}</button>
          <button class="btn btn-red" style="font-size:10px;padding:3px 8px" onclick="deleteSpecial(${s.id})">Del</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function createSpecial(){
  const itemName=document.getElementById('sName').value.trim();
  const specialPrice=document.getElementById('sSpecial').value;
  if(!itemName||!specialPrice){showToast('Item name and special price required','error');return;}
  const body={itemName,description:document.getElementById('sDesc').value,date:document.getElementById('sDate').value||new Date().toISOString().split('T')[0],mealType:document.getElementById('sMeal').value,originalPrice:parseFloat(document.getElementById('sOriginal').value)||0,specialPrice:parseFloat(specialPrice),availableQty:document.getElementById('sQty').value||null};
  const r=await fetch('/api/specials',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Special added!','success');document.getElementById('sName').value='';document.getElementById('sDesc').value='';document.getElementById('sSpecial').value='';document.getElementById('sOriginal').value='';document.getElementById('sQty').value='';loadToday();loadSpecials();}
  else showToast(d.message||'Error','error');
}

async function toggleSpecial(id,active){
  await fetch(`/api/specials/${id}`,{method:'PATCH',headers:authH(),body:JSON.stringify({active})});
  loadToday();loadSpecials();
}

async function deleteSpecial(id){
  if(!confirm('Delete this special?'))return;
  await fetch(`/api/specials/${id}`,{method:'DELETE',headers:authH()});
  loadToday();loadSpecials();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

document.getElementById('sDate').value=new Date().toISOString().split('T')[0];
document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
loadToday();loadSpecials();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
