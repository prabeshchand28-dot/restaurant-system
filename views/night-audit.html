<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Night Audit</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--gold:#b7860a;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1200px;margin:0 auto}
.grid{display:grid;grid-template-columns:400px 1fr;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--navy);color:#fff;padding:12px 16px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:16px}
label{display:block;font-size:11px;font-weight:800;color:var(--navy);margin-bottom:3px;margin-top:10px;text-transform:uppercase;letter-spacing:.4px}
label:first-child{margin-top:0}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;width:100%}
input:focus,select:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.btn-green{background:var(--green)}.btn-red{background:var(--red)}.btn-gold{background:var(--gold);color:#fff}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.section-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.diff{font-size:12px;font-weight:700}
.diff.pos{color:var(--green)}.diff.neg{color:var(--red)}
.audit-card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--white)}
.audit-card:hover{border-color:var(--blue)}
.kv{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #f0f0f0}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--muted)}.kv .v{font-weight:800}
.summary-stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.summary-stat .num{font-size:18px;font-weight:900}.summary-stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Night Audit</span></span>
  <div><a class="nav-btn" href="/reports">📈 Reports</a><a class="nav-btn" href="/dashboard">📊 Dashboard</a></div>
</div>
<div class="content">
  <div class="grid">
    <div>
      <div class="card">
        <div class="card-header">🌙 Audit Entry
          <div>
            <input type="date" id="aDate" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:12px;padding:4px 8px;border-radius:4px;width:auto;font-family:var(--font)"/>
            <button class="btn" style="font-size:11px;padding:4px 10px;margin-left:6px" onclick="loadExisting()">Load</button>
          </div>
        </div>
        <div class="card-body">
          <div class="section-title">Revenue</div>
          <div class="frow">
            <div><label>Expected (रू)</label><input type="number" id="aExpected" placeholder="0" oninput="calcDiff()"/></div>
            <div><label>Actual (रू)</label><input type="number" id="aActual" placeholder="0" oninput="calcDiff()"/></div>
          </div>
          <div id="diffLine" style="margin-top:6px;font-size:12px;display:none"></div>
          <div class="frow">
            <div><label>Cash on Hand (रू)</label><input type="number" id="aCash" placeholder="0"/></div>
            <div><label>Card Revenue (रू)</label><input type="number" id="aCard" placeholder="0"/></div>
          </div>

          <div class="section-title">Operations</div>
          <div class="frow">
            <div><label>Covers Served</label><input type="number" id="aCovers" placeholder="0"/></div>
            <div><label>Orders Count</label><input type="number" id="aOrders" placeholder="0"/></div>
          </div>

          <div class="section-title">Deductions</div>
          <div class="frow">
            <div><label>Void Amount (रू)</label><input type="number" id="aVoids" placeholder="0"/></div>
            <div><label>Discount Amount (रू)</label><input type="number" id="aDiscount" placeholder="0"/></div>
          </div>
          <div class="frow">
            <div><label>Staff Meal Cost (रू)</label><input type="number" id="aMeals" placeholder="0"/></div>
            <div><label>Waste Amount (रू)</label><input type="number" id="aWaste" placeholder="0"/></div>
          </div>

          <div class="section-title">Float</div>
          <div class="frow">
            <div><label>Opening Float (रू)</label><input type="number" id="aOpenFloat" placeholder="0"/></div>
            <div><label>Closing Float (रू)</label><input type="number" id="aCloseFloat" placeholder="0"/></div>
          </div>

          <label style="margin-top:12px">Closed By</label><input id="aClosedBy" placeholder="Manager name"/>
          <label>Notes</label><input id="aNotes" placeholder="Any observations..."/>

          <button class="btn btn-green" style="width:100%;margin-top:14px" onclick="saveAudit()">💾 Save Night Audit</button>
        </div>
      </div>
    </div>
    <div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px" id="summaryStats">
        <div class="summary-stat"><div class="num" id="ss-audits" style="color:var(--navy)">—</div><div class="lbl">Audits (7 days)</div></div>
        <div class="summary-stat"><div class="num" id="ss-avg" style="color:var(--green)">—</div><div class="lbl">Avg Actual Rev</div></div>
        <div class="summary-stat"><div class="num" id="ss-covers" style="color:var(--blue)">—</div><div class="lbl">Avg Covers/Night</div></div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
        <span style="font-size:13px;font-weight:700;color:var(--navy)">Recent Audits</span>
        <button class="btn" style="font-size:11px;padding:4px 10px;margin-left:auto" onclick="loadAudits()">Refresh</button>
      </div>
      <div id="auditList">Loading...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});
const today=new Date().toISOString().slice(0,10);
document.getElementById('aDate').value=today;

function calcDiff(){
  const exp=parseFloat(document.getElementById('aExpected').value)||0;
  const act=parseFloat(document.getElementById('aActual').value)||0;
  const dl=document.getElementById('diffLine');
  if(!exp&&!act){dl.style.display='none';return;}
  const diff=act-exp;
  const pct=exp>0?Math.round(diff/exp*100):0;
  dl.style.display='block';
  dl.innerHTML=`Variance: <span class="diff ${diff>=0?'pos':'neg'}">${diff>=0?'+':''}रू ${Math.abs(diff).toLocaleString()} (${diff>=0?'+':''}${pct}%)</span>`;
}

async function loadExisting(){
  const date=document.getElementById('aDate').value;
  const r=await fetch('/api/night-audit/today?date='+date,{headers:authH(),cache:'no-store'});
  const d=await r.json();
  if(!d||d.message){showToast('No audit for this date','info');clearForm();return;}
  document.getElementById('aExpected').value=d.expectedRevenue||'';
  document.getElementById('aActual').value=d.actualRevenue||'';
  document.getElementById('aCash').value=d.cashOnHand||'';
  document.getElementById('aCard').value=d.cardRevenue||'';
  document.getElementById('aCovers').value=d.coversServed||'';
  document.getElementById('aOrders').value=d.ordersCount||'';
  document.getElementById('aVoids').value=d.voidAmount||'';
  document.getElementById('aDiscount').value=d.discountAmount||'';
  document.getElementById('aMeals').value=d.staffMealCost||'';
  document.getElementById('aWaste').value=d.wasteAmount||'';
  document.getElementById('aOpenFloat').value=d.openingFloat||'';
  document.getElementById('aCloseFloat').value=d.closingFloat||'';
  document.getElementById('aClosedBy').value=d.closedBy||'';
  document.getElementById('aNotes').value=d.notes||'';
  calcDiff();
  showToast('Loaded existing audit','success');
}

function clearForm(){
  ['aExpected','aActual','aCash','aCard','aCovers','aOrders','aVoids','aDiscount','aMeals','aWaste','aOpenFloat','aCloseFloat','aClosedBy','aNotes'].forEach(id=>document.getElementById(id).value='');
}

function gn(id){return parseFloat(document.getElementById(id).value)||0;}

async function saveAudit(){
  const body={
    auditDate:document.getElementById('aDate').value,
    expectedRevenue:gn('aExpected'),actualRevenue:gn('aActual'),
    cashOnHand:gn('aCash'),cardRevenue:gn('aCard'),
    coversServed:gn('aCovers'),ordersCount:gn('aOrders'),
    voidAmount:gn('aVoids'),discountAmount:gn('aDiscount'),
    staffMealCost:gn('aMeals'),wasteAmount:gn('aWaste'),
    openingFloat:gn('aOpenFloat'),closingFloat:gn('aCloseFloat'),
    closedBy:document.getElementById('aClosedBy').value,
    notes:document.getElementById('aNotes').value
  };
  const r=await fetch('/api/night-audit',{method:'POST',headers:authH(),body:JSON.stringify(body)});
  const d=await r.json();
  if(d.id){showToast('Audit saved!','success');loadSummary();loadAudits();}
  else showToast(d.message||'Error','error');
}

async function loadSummary(){
  const r=await fetch('/api/night-audit/summary?days=7',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  document.getElementById('ss-audits').textContent=d.count||0;
  document.getElementById('ss-avg').textContent='रू '+(Math.round(d.avgActual)||0).toLocaleString();
  document.getElementById('ss-covers').textContent=Math.round(d.avgCovers)||0;
}

async function loadAudits(){
  const r=await fetch('/api/night-audit',{headers:authH(),cache:'no-store'});
  const audits=await r.json();
  if(!audits.length){document.getElementById('auditList').innerHTML='<div style="text-align:center;padding:60px;background:var(--white);border-radius:12px;color:var(--muted)">No audits yet</div>';return;}
  document.getElementById('auditList').innerHTML=audits.map(a=>{
    const diff=a.actualRevenue-a.expectedRevenue;
    return `<div class="audit-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <strong style="font-size:14px">${new Date(a.auditDate).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</strong>
        <span class="diff ${diff>=0?'pos':'neg'}">${diff>=0?'+':''}रू ${Math.abs(diff).toLocaleString()}</span>
      </div>
      <div class="kv"><span class="k">Actual Revenue</span><span class="v" style="color:var(--green)">रू ${a.actualRevenue.toLocaleString()}</span></div>
      <div class="kv"><span class="k">Expected</span><span class="v">रू ${a.expectedRevenue.toLocaleString()}</span></div>
      <div class="kv"><span class="k">Covers / Orders</span><span class="v">${a.coversServed} / ${a.ordersCount}</span></div>
      <div class="kv"><span class="k">Avg Spend</span><span class="v">रू ${Math.round(a.avgSpend).toLocaleString()}</span></div>
      <div class="kv"><span class="k">Cash / Card</span><span class="v">रू ${a.cashOnHand.toLocaleString()} / रू ${a.cardRevenue.toLocaleString()}</span></div>
      <div class="kv"><span class="k">Voids / Discounts</span><span class="v">रू ${a.voidAmount} / रू ${a.discountAmount}</span></div>
      ${a.closedBy?`<div class="kv"><span class="k">Closed By</span><span class="v">${a.closedBy}</span></div>`:''}
      ${a.notes?`<div style="font-size:11px;color:var(--muted);margin-top:6px">${a.notes}</div>`:''}
      <button class="btn btn-red" style="font-size:11px;padding:4px 10px;margin-top:8px" onclick="delAudit(${a.id})">Delete</button>
    </div>`;
  }).join('');
}

async function delAudit(id){
  if(!confirm('Delete this audit?'))return;
  await fetch(`/api/night-audit/${id}`,{method:'DELETE',headers:authH()});
  loadAudits();loadSummary();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

loadSummary();loadAudits();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
