<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#f97316"/><link rel="apple-touch-icon" href="/icons/icon-192.png"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Uena"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Online Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--orange:#e65100;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block;margin-left:6px}
.content{padding:24px;max-width:1200px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat .num{font-size:22px;font-weight:900;color:var(--blue)}.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:var(--white)}
.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.order-card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:800;text-transform:uppercase}
.badge-pending{background:#fff9c4;color:#827717}
.badge-confirmed{background:#e8efff;color:var(--blue)}
.badge-preparing{background:#fff3e0;color:var(--orange)}
.badge-ready{background:#e7f5ed;color:var(--green)}
.badge-delivered{background:#e7f5ed;color:var(--green)}
.badge-cancelled{background:#fce8e7;color:var(--red)}
.status-select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);background:var(--white)}
.btn-sm{padding:5px 10px;font-size:11px;font-weight:700;border:none;border-radius:4px;cursor:pointer;font-family:var(--font);background:var(--blue);color:#fff}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Online Orders</span></span>
  <div>
    <a class="nav-btn" href="/menu" target="_blank">🌐 Public Menu</a>
    <a class="nav-btn" href="/kitchen">👨‍🍳 Kitchen</a>
    <a class="nav-btn" href="/dashboard">📊 Dashboard</a>
  </div>
</div>
<div class="content">
  <div class="stats">
    <div class="stat"><div class="num" id="s-total">—</div><div class="lbl">Total Orders</div></div>
    <div class="stat"><div class="num pulse" id="s-pending" style="color:var(--orange)">—</div><div class="lbl">⚡ Pending</div></div>
    <div class="stat"><div class="num" id="s-confirmed">—</div><div class="lbl">In Progress</div></div>
    <div class="stat"><div class="num" id="s-today">—</div><div class="lbl">Today</div></div>
    <div class="stat"><div class="num" id="s-revenue" style="color:var(--green)">—</div><div class="lbl">Today Revenue</div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filter('',this)">All</button>
    <button class="filter-btn" onclick="filter('PENDING',this)">⚡ Pending</button>
    <button class="filter-btn" onclick="filter('CONFIRMED',this)">✅ Confirmed</button>
    <button class="filter-btn" onclick="filter('PREPARING',this)">👨‍🍳 Preparing</button>
    <button class="filter-btn" onclick="filter('READY',this)">📦 Ready</button>
    <button class="filter-btn" onclick="filter('DELIVERED',this)">✔ Delivered</button>
    <button class="filter-btn" onclick="filter('CANCELLED',this)">❌ Cancelled</button>
  </div>

  <div class="card">
    <div class="card-header">
      🛵 Online Orders
      <button class="btn-sm" onclick="loadOrders()">🔄 Refresh</button>
    </div>
    <div style="padding:16px" id="orderList">
      <div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});
let currentFilter='';

const STATUSES=['PENDING','CONFIRMED','PREPARING','READY','DELIVERED','CANCELLED'];
const badgeCls={PENDING:'badge-pending',CONFIRMED:'badge-confirmed',PREPARING:'badge-preparing',READY:'badge-ready',DELIVERED:'badge-delivered',CANCELLED:'badge-cancelled'};

async function loadStats(){
  const r=await fetch('/api/online-orders/stats',{headers:authH(),cache:'no-store'});
  const d=await r.json();
  document.getElementById('s-total').textContent=d.total;
  document.getElementById('s-pending').textContent=d.pending;
  document.getElementById('s-confirmed').textContent=d.confirmed;
  document.getElementById('s-today').textContent=d.todayCount;
  document.getElementById('s-revenue').textContent='रू '+(d.todayRevenue||0).toLocaleString();
}

async function loadOrders(){
  loadStats();
  const url='/api/online-orders'+(currentFilter?'?status='+currentFilter:'');
  const r=await fetch(url,{headers:authH(),cache:'no-store'});
  const orders=await r.json();
  if(!orders.length){
    document.getElementById('orderList').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No orders found</div>';
    return;
  }
  document.getElementById('orderList').innerHTML=orders.map(o=>`
    <div class="order-card" id="ord-${o.id}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-weight:900;font-size:15px">Order #${o.id} · ${o.customerName}</div>
          <div style="font-size:12px;color:var(--muted)">${o.customerPhone} ${o.customerEmail?'· '+o.customerEmail:''}</div>
          ${o.address?`<div style="font-size:12px;color:var(--navy);margin-top:2px">📍 ${o.address}</div>`:''}
        </div>
        <div style="text-align:right">
          <span class="badge ${badgeCls[o.status]||'badge-confirmed'}">${o.status}</span>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">${new Date(o.createdAt).toLocaleString()}</div>
        </div>
      </div>
      <div style="background:#f8f9fb;border-radius:8px;padding:10px;margin-bottom:10px;font-size:13px">
        ${o.items.map(i=>`<div style="display:flex;justify-content:space-between"><span>${i.quantity}× ${i.name}</span><span>रू ${(i.price*i.quantity).toLocaleString()}</span></div>`).join('')}
        <div style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px;font-weight:900;display:flex;justify-content:space-between">
          <span>Total</span><span style="color:var(--green)">रू ${(o.total||0).toLocaleString()}</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-size:12px;font-weight:700">Update:</span>
          <select class="status-select" id="sel-${o.id}">
            ${STATUSES.map(s=>`<option value="${s}"${s===o.status?' selected':''}>${s}</option>`).join('')}
          </select>
          <button class="btn-sm" onclick="updateStatus(${o.id})">Apply</button>
        </div>
        <div style="font-size:12px;color:var(--muted)">
          ${o.orderType==='DELIVERY'?'🛵 Delivery':'🏃 Pickup'}
          · ${o.paymentMethod} (${o.paymentStatus})
        </div>
      </div>
      ${o.notes?`<div style="font-size:12px;color:var(--muted);margin-top:8px;background:#fffbf0;padding:6px 10px;border-radius:6px">📝 ${o.notes}</div>`:''}
    </div>`).join('');
}

async function updateStatus(id){
  const status=document.getElementById('sel-'+id).value;
  const r=await fetch(`/api/online-orders/${id}/status`,{method:'PATCH',headers:authH(),body:JSON.stringify({status})});
  const d=await r.json();
  if(d.id){showToast('Status updated to '+d.status,'success');loadOrders();}
  else showToast(d.message||'Error','error');
}

function filter(status,el){
  currentFilter=status;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  loadOrders();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}

loadOrders();
// Auto-refresh every 30s
setInterval(loadOrders,30000);
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
