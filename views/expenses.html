<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><link rel="manifest" href="/manifest.json"/><meta name="theme-color" content="#f97316"/><link rel="apple-touch-icon" href="/icons/icon-192.png"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Uena"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Expense Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1a3a6b;--blue:#2653a0;--green:#1a7a3a;--red:#c0392b;--bg:#f0f2f5;--white:#fff;--border:#d0d5e0;--muted:#666;--font:'Plus Jakarta Sans',sans-serif}
body{font-family:var(--font);background:var(--bg);color:#1a1a1a}
.topbar{background:var(--navy);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:17px;font-weight:800}.brand span{font-size:12px;font-weight:400;opacity:.7;margin-left:8px}
.nav-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;display:inline-block}
.content{padding:24px;max-width:1400px;margin:0 auto}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px}
.sv{font-size:26px;font-weight:900;color:var(--navy)}.sl{font-size:12px;color:var(--muted);margin-top:2px}
.grid2{display:grid;grid-template-columns:1fr 340px;gap:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{background:var(--blue);color:#fff;padding:12px 16px;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f0f2f5;padding:8px 12px;text-align:left;font-weight:700;color:var(--navy);border-bottom:2px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#fafbfc}
input,select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;margin-bottom:10px}
input:focus,select:focus{border-color:var(--blue)}
label{font-size:12px;font-weight:600;color:var(--navy);display:block;margin-bottom:3px}
.btn{padding:9px 18px;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-primary{background:var(--blue);color:#fff}.btn-danger{background:var(--red);color:#fff}.btn-sm{padding:4px 10px;font-size:11px}
.cat-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.cat-fill{height:6px;border-radius:3px;background:var(--blue);margin-top:4px}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;background:#e8eef8;color:var(--blue)}
.toast{position:fixed;top:14px;right:16px;background:var(--navy);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}.toast.success{background:var(--green)}.toast.error{background:var(--red)}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">🍽️ Restaurant System <span>Expense Tracking</span></span>
  <a class="nav-btn" href="/dashboard">📊 Dashboard</a>
</div>
<div class="content">
  <div class="stats-row">
    <div class="stat-card"><div class="sv" id="st-total">—</div><div class="sl">Total Expenses (रू)</div></div>
    <div class="stat-card"><div class="sv" id="st-count">—</div><div class="sl">This Month</div></div>
    <div class="stat-card"><div class="sv" id="st-top">—</div><div class="sl">Top Category</div></div>
    <div class="stat-card">
      <label style="font-size:11px;margin-bottom:4px">Filter Month</label>
      <input type="month" id="monthFilter" style="margin:0;padding:5px 8px;font-size:12px" onchange="load()"/>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-header">
        💰 Expense List
        <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff;border:none" onclick="load()">↺ Refresh</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th><th>Mode</th><th>Actions</th></tr></thead>
          <tbody id="expTable"><tr><td colspan="6" style="text-align:center;padding:20px;color:var(--muted)">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="card">
        <div class="card-header">➕ Add Expense</div>
        <div class="card-body">
          <label>Category *</label>
          <select id="e-cat">
            <option>Rent</option><option>Utilities</option><option>Supplies</option><option>Staff</option>
            <option>Marketing</option><option>Maintenance</option><option>Food & Beverage</option><option>Equipment</option><option>Other</option>
          </select>
          <label>Description *</label><input id="e-desc" placeholder="What was this expense for?"/>
          <label>Amount (रू) *</label><input id="e-amt" type="number" placeholder="1000"/>
          <label>Date *</label><input id="e-date" type="date"/>
          <label>Payment Mode</label>
          <select id="e-mode"><option>Cash</option><option>Bank</option><option>Card</option></select>
          <label>Receipt Ref</label><input id="e-ref" placeholder="Invoice # or receipt ref"/>
          <button class="btn btn-primary" style="width:100%" onclick="addExpense()">Add Expense</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header">📊 By Category</div>
        <div class="card-body" id="catBreakdown"><div style="color:var(--muted);font-size:13px">Loading…</div></div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const token=localStorage.getItem('token');
const authH=()=>({Authorization:'Bearer '+token,'Content-Type':'application/json'});

document.getElementById('e-date').value=new Date().toISOString().slice(0,10);
document.getElementById('monthFilter').value=new Date().toISOString().slice(0,7);

async function load(){
  const month=document.getElementById('monthFilter').value;
  const [expR,sumR]=await Promise.all([
    fetch(`/api/expenses?month=${month}`,{headers:authH(),cache:'no-store'}),
    fetch(`/api/expenses/summary?month=${month}`,{headers:authH(),cache:'no-store'}),
  ]);
  const expenses=await expR.json();
  const summary=await sumR.json();

  document.getElementById('st-total').textContent='रू '+(summary.total||0).toLocaleString();
  document.getElementById('st-count').textContent=summary.count||0;
  const topCat=Object.entries(summary.byCategory||{}).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('st-top').textContent=topCat?topCat[0]:'—';

  const tbody=document.getElementById('expTable');
  if(!expenses.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--muted)">No expenses this month</td></tr>';return;}
  tbody.innerHTML=expenses.map(e=>`
    <tr>
      <td>${e.date}</td>
      <td><span class="cat-badge">${e.category}</span></td>
      <td>${e.description}</td>
      <td><strong>रू ${e.amount.toLocaleString()}</strong></td>
      <td>${e.paymentMode}</td>
      <td><button class="btn btn-sm btn-danger" onclick="deleteExpense(${e.id})">Del</button></td>
    </tr>`).join('');

  // Category breakdown
  const total=summary.total||1;
  const cats=summary.byCategory||{};
  document.getElementById('catBreakdown').innerHTML=Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>`
    <div class="cat-bar">
      <span>${cat}</span>
      <strong>रू ${amt.toLocaleString()}</strong>
    </div>
    <div class="cat-fill" style="width:${Math.round(amt/total*100)}%"></div>`).join('<div style="margin-bottom:8px"></div>')||'<div style="color:var(--muted);font-size:13px">No data</div>';
}

async function addExpense(){
  const category=document.getElementById('e-cat').value;
  const description=document.getElementById('e-desc').value.trim();
  const amount=document.getElementById('e-amt').value;
  const date=document.getElementById('e-date').value;
  const paymentMode=document.getElementById('e-mode').value;
  const receiptRef=document.getElementById('e-ref').value;
  if(!description||!amount||!date){showToast('Description, amount and date required','error');return;}
  const r=await fetch('/api/expenses',{method:'POST',headers:authH(),body:JSON.stringify({category,description,amount,date,paymentMode,receiptRef})});
  const d=await r.json();
  if(d.success){showToast('Expense added!','success');['e-desc','e-amt','e-ref'].forEach(id=>document.getElementById(id).value='');load();}
  else showToast(d.message,'error');
}

async function deleteExpense(id){
  if(!confirm('Delete this expense?'))return;
  await fetch(`/api/expenses/${id}`,{method:'DELETE',headers:authH()});
  load();
}

let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3500)}
load();
</script>
<script src="/js/autoupdate.js"></script>
</body></html>
